<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="500" fill="#1a1a1a" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#e5e5e5" font-size="18" font-weight="700">Paginación por Offset vs Cursor</text>
  <text x="480" y="58" text-anchor="middle" fill="#888" font-size="12">Comparativa visual de ambas estrategias con Prisma</text>

  <!-- ============ OFFSET (LEFT) ============ -->
  <text x="230" y="88" text-anchor="middle" fill="#e06b6b" font-size="14" font-weight="700">Offset Pagination</text>

  <!-- Table rows — simulating DB -->
  <rect x="60" y="100" width="340" height="24" rx="3" fill="#2a1a1a" stroke="#e06b6b" stroke-width="1"/>
  <text x="80" y="116" fill="#888" font-size="10">id</text>
  <text x="130" y="116" fill="#888" font-size="10">nombre</text>
  <text x="250" y="116" fill="#888" font-size="10">createdAt</text>
  <text x="360" y="116" fill="#555" font-size="10" text-anchor="end">row#</text>

  <!-- Rows 1-10 simulated -->
  <rect x="60" y="126" width="340" height="16" rx="2" fill="#222"/>
  <text x="80" y="138" fill="#555" font-size="10">1</text><text x="130" y="138" fill="#555" font-size="10">Producto A</text><text x="360" y="138" fill="#555" text-anchor="end" font-size="10">1</text>
  <rect x="60" y="144" width="340" height="16" rx="2" fill="#1e1e1e"/>
  <text x="80" y="156" fill="#555" font-size="10">2</text><text x="130" y="156" fill="#555" font-size="10">Producto B</text><text x="360" y="156" fill="#555" text-anchor="end" font-size="10">2</text>
  <rect x="60" y="162" width="340" height="16" rx="2" fill="#222"/>
  <text x="80" y="174" fill="#555" font-size="10">3</text><text x="130" y="174" fill="#555" font-size="10">Producto C</text><text x="360" y="174" fill="#555" text-anchor="end" font-size="10">3</text>

  <!-- Highlighted page 1 (rows 4-6 = skip 0, take 3) -->
  <rect x="60" y="180" width="340" height="16" rx="2" fill="#3a1a1a" stroke="#e06b6b" stroke-width="0.5"/>
  <text x="80" y="192" fill="#e5e5e5" font-size="10">4</text><text x="130" y="192" fill="#e5e5e5" font-size="10">Producto D</text><text x="360" y="192" fill="#e06b6b" text-anchor="end" font-size="10">4 ← página 2</text>
  <rect x="60" y="198" width="340" height="16" rx="2" fill="#3a1a1a" stroke="#e06b6b" stroke-width="0.5"/>
  <text x="80" y="210" fill="#e5e5e5" font-size="10">5</text><text x="130" y="210" fill="#e5e5e5" font-size="10">Producto E</text><text x="360" y="210" fill="#e06b6b" text-anchor="end" font-size="10">5</text>
  <rect x="60" y="216" width="340" height="16" rx="2" fill="#3a1a1a" stroke="#e06b6b" stroke-width="0.5"/>
  <text x="80" y="228" fill="#e5e5e5" font-size="10">6</text><text x="130" y="228" fill="#e5e5e5" font-size="10">Producto F</text><text x="360" y="228" fill="#e06b6b" text-anchor="end" font-size="10">6</text>

  <rect x="60" y="234" width="340" height="16" rx="2" fill="#222"/>
  <text x="80" y="246" fill="#555" font-size="10">7…</text><text x="130" y="246" fill="#555" font-size="10">…</text>

  <!-- Offset label -->
  <text x="80" y="268" fill="#e06b6b" font-size="11" font-weight="600">Prisma: skip=3, take=3</text>
  <text x="80" y="284" fill="#555" font-size="10">📌 DB escanea rows 1–6 para saltar 3</text>
  <text x="80" y="298" fill="#555" font-size="10">📌 Con millones de rows: OFFSET 500000 → lento</text>

  <!-- Pros/Cons Offset -->
  <rect x="60" y="314" width="340" height="90" rx="6" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="80" y="333" fill="#68A063" font-size="11" font-weight="600">✓ Ventajas</text>
  <text x="80" y="350" fill="#888" font-size="10">• Navegar a cualquier página directamente</text>
  <text x="80" y="365" fill="#888" font-size="10">• Simple de implementar</text>
  <text x="80" y="380" fill="#e06b6b" font-size="11" font-weight="600">✗ Desventajas</text>
  <text x="80" y="397" fill="#888" font-size="10">• Datos duplicados/pérdidos si hay inserciones entre páginas</text>

  <!-- API example: offset -->
  <rect x="60" y="416" width="340" height="60" rx="6" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
  <text x="80" y="434" fill="#6e9fd4" font-size="10" font-family="monospace">GET /products?page=2&amp;limit=3</text>
  <text x="80" y="450" fill="#555" font-size="10" font-family="monospace">→ { data: [...], total: 50,</text>
  <text x="80" y="464" fill="#555" font-size="10" font-family="monospace">    page: 2, totalPages: 17 }</text>

  <!-- ============ CURSOR (RIGHT) ============ -->
  <text x="720" y="88" text-anchor="middle" fill="#68A063" font-size="14" font-weight="700">Cursor Pagination</text>

  <!-- Table rows — simulating DB -->
  <rect x="550" y="100" width="360" height="24" rx="3" fill="#1a2a1a" stroke="#68A063" stroke-width="1"/>
  <text x="570" y="116" fill="#888" font-size="10">id (cursor)</text>
  <text x="660" y="116" fill="#888" font-size="10">nombre</text>
  <text x="890" y="116" fill="#555" font-size="10" text-anchor="end">index</text>

  <rect x="550" y="126" width="360" height="16" rx="2" fill="#222"/>
  <text x="570" y="138" fill="#555" font-size="10">abc1</text><text x="660" y="138" fill="#555" font-size="10">Producto A</text>
  <rect x="550" y="144" width="360" height="16" rx="2" fill="#1e1e1e"/>
  <text x="570" y="156" fill="#555" font-size="10">abc2</text><text x="660" y="156" fill="#555" font-size="10">Producto B</text>
  <rect x="550" y="162" width="360" height="16" rx="2" fill="#222"/>
  <text x="570" y="174" fill="#555" font-size="10">abc3</text><text x="660" y="174" fill="#555" font-size="10">Producto C → último visto</text>

  <!-- Highlighted cursor page (after abc3) -->
  <rect x="550" y="180" width="360" height="16" rx="2" fill="#1a2a1a" stroke="#68A063" stroke-width="0.5"/>
  <text x="570" y="192" fill="#e5e5e5" font-size="10">abc4</text><text x="660" y="192" fill="#e5e5e5" font-size="10">Producto D</text><text x="890" y="192" fill="#68A063" text-anchor="end" font-size="10">cursor = abc3, take=3</text>
  <rect x="550" y="198" width="360" height="16" rx="2" fill="#1a2a1a" stroke="#68A063" stroke-width="0.5"/>
  <text x="570" y="210" fill="#e5e5e5" font-size="10">abc5</text><text x="660" y="210" fill="#e5e5e5" font-size="10">Producto E</text>
  <rect x="550" y="216" width="360" height="16" rx="2" fill="#1a2a1a" stroke="#68A063" stroke-width="0.5"/>
  <text x="570" y="228" fill="#e5e5e5" font-size="10">abc6</text><text x="660" y="228" fill="#e5e5e5" font-size="10">Producto F</text>

  <!-- Extra row (N+1 trick) -->
  <rect x="550" y="234" width="360" height="16" rx="2" fill="#2a2a1a" stroke="#f0a05a" stroke-width="0.5" stroke-dasharray="4,2"/>
  <text x="570" y="246" fill="#f0a05a" font-size="10">abc7</text><text x="660" y="246" fill="#f0a05a" font-size="10">Producto G ← take N+1 para hasNextPage</text>

  <!-- Cursor label -->
  <text x="570" y="268" fill="#68A063" font-size="11" font-weight="600">Prisma: cursor={id:'abc3'}, skip=1, take=4</text>
  <text x="570" y="284" fill="#555" font-size="10">📌 DB usa índice directamente desde cursor</text>
  <text x="570" y="298" fill="#555" font-size="10">📌 Igual de rápido con 10M de registros</text>

  <!-- Pros/Cons Cursor -->
  <rect x="550" y="314" width="360" height="90" rx="6" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="570" y="333" fill="#68A063" font-size="11" font-weight="600">✓ Ventajas</text>
  <text x="570" y="350" fill="#888" font-size="10">• Rendimiento constante O(1) por cursor</text>
  <text x="570" y="365" fill="#888" font-size="10">• Sin datos duplicados ni pérdidos</text>
  <text x="570" y="380" fill="#e06b6b" font-size="11" font-weight="600">✗ Desventajas</text>
  <text x="570" y="397" fill="#888" font-size="10">• No permite saltar a página N directamente</text>

  <!-- API example: cursor -->
  <rect x="550" y="416" width="360" height="60" rx="6" fill="#1a2a1a" stroke="#333" stroke-width="1"/>
  <text x="570" y="434" fill="#68A063" font-size="10" font-family="monospace">GET /products?cursor=abc3&amp;limit=3</text>
  <text x="570" y="450" fill="#555" font-size="10" font-family="monospace">→ { data: [...], hasNextPage: true,</text>
  <text x="570" y="464" fill="#555" font-size="10" font-family="monospace">    nextCursor: "abc6" }</text>

  <!-- Divider -->
  <line x1="480" y1="85" x2="480" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="490" text-anchor="middle" fill="#444" font-size="10">vs</text>
</svg>
