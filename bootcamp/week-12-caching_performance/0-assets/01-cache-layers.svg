<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="520" fill="#1a1a1a" rx="12"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#e5e5e5" font-size="18" font-weight="700">Capas de Caché en una API REST</text>
  <text x="480" y="62" text-anchor="middle" fill="#888" font-size="12">Cada capa reduce latencia y carga en la capa siguiente</text>

  <!-- ========== CLIENT ========== -->
  <rect x="40" y="90" width="140" height="56" rx="8" fill="#222" stroke="#555" stroke-width="1.5"/>
  <text x="110" y="116" text-anchor="middle" fill="#e5e5e5" font-size="13" font-weight="600">Cliente</text>
  <text x="110" y="134" text-anchor="middle" fill="#888" font-size="11">Browser / App</text>

  <!-- ========== CDN ========== -->
  <rect x="240" y="90" width="160" height="56" rx="8" fill="#1a2a1a" stroke="#68A063" stroke-width="1.5"/>
  <text x="320" y="112" text-anchor="middle" fill="#68A063" font-size="13" font-weight="600">CDN / Proxy</text>
  <text x="320" y="128" text-anchor="middle" fill="#888" font-size="11">Cloudflare / Nginx</text>
  <text x="320" y="143" text-anchor="middle" fill="#555" font-size="10">Cache-Control headers</text>

  <!-- ========== EXPRESS ========== -->
  <rect x="460" y="90" width="160" height="56" rx="8" fill="#1a1a2a" stroke="#6e9fd4" stroke-width="1.5"/>
  <text x="540" y="112" text-anchor="middle" fill="#6e9fd4" font-size="13" font-weight="600">Express</text>
  <text x="540" y="128" text-anchor="middle" fill="#888" font-size="11">API Server</text>
  <text x="540" y="143" text-anchor="middle" fill="#555" font-size="10">cache middleware</text>

  <!-- ========== REDIS ========== -->
  <rect x="680" y="90" width="140" height="56" rx="8" fill="#2a1a1a" stroke="#e06b6b" stroke-width="1.5"/>
  <text x="750" y="116" text-anchor="middle" fill="#e06b6b" font-size="13" font-weight="600">Redis</text>
  <text x="750" y="134" text-anchor="middle" fill="#888" font-size="11">In-memory cache</text>

  <!-- ========== DATABASE ========== -->
  <rect x="840" y="90" width="80" height="56" rx="8" fill="#222" stroke="#555" stroke-width="1.5"/>
  <text x="880" y="116" text-anchor="middle" fill="#e5e5e5" font-size="12" font-weight="600">DB</text>
  <text x="880" y="134" text-anchor="middle" fill="#888" font-size="11">PostgreSQL</text>

  <!-- ========== ARROWS TOP ========== -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-hit" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#68A063"/>
    </marker>
    <marker id="arr-miss" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e06b6b"/>
    </marker>
  </defs>

  <line x1="182" y1="118" x2="238" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="402" y1="118" x2="458" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="622" y1="118" x2="678" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="822" y1="118" x2="838" y2="118" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ========== CACHE-ASIDE DIAGRAM ========== -->
  <text x="480" y="190" text-anchor="middle" fill="#888" font-size="12" font-weight="600">Estrategia Cache-Aside (Lazy Loading)</text>

  <!-- Steps Left Column -->
  <!-- Step 1: Request -->
  <rect x="60" y="210" width="200" height="42" rx="6" fill="#222" stroke="#6e9fd4" stroke-width="1"/>
  <text x="160" y="228" text-anchor="middle" fill="#6e9fd4" font-size="11" font-weight="600">① GET /products</text>
  <text x="160" y="244" text-anchor="middle" fill="#888" font-size="10">Cliente → Express middleware</text>

  <!-- Step 2: Redis GET -->
  <rect x="60" y="272" width="200" height="42" rx="6" fill="#222" stroke="#e06b6b" stroke-width="1"/>
  <text x="160" y="290" text-anchor="middle" fill="#e06b6b" font-size="11" font-weight="600">② redis.get("products")</text>
  <text x="160" y="306" text-anchor="middle" fill="#888" font-size="10">Middleware consulta caché</text>

  <!-- Branch: Hit -->
  <rect x="60" y="334" width="90" height="42" rx="6" fill="#1a2a1a" stroke="#68A063" stroke-width="1"/>
  <text x="105" y="352" text-anchor="middle" fill="#68A063" font-size="11" font-weight="600">HIT ✓</text>
  <text x="105" y="366" text-anchor="middle" fill="#888" font-size="10">~1–2 ms</text>

  <!-- Branch: Miss -->
  <rect x="170" y="334" width="90" height="42" rx="6" fill="#2a1a1a" stroke="#e06b6b" stroke-width="1"/>
  <text x="215" y="352" text-anchor="middle" fill="#e06b6b" font-size="11" font-weight="600">MISS ✗</text>
  <text x="215" y="366" text-anchor="middle" fill="#888" font-size="10">→ consulta DB</text>

  <!-- Step 3: DB Query (on Miss) -->
  <rect x="170" y="396" width="90" height="42" rx="6" fill="#222" stroke="#555" stroke-width="1"/>
  <text x="215" y="414" text-anchor="middle" fill="#e5e5e5" font-size="11" font-weight="600">③ DB Query</text>
  <text x="215" y="430" text-anchor="middle" fill="#888" font-size="10">~20–200 ms</text>

  <!-- Step 4: Set in cache -->
  <rect x="170" y="458" width="90" height="42" rx="6" fill="#222" stroke="#e06b6b" stroke-width="1"/>
  <text x="215" y="476" text-anchor="middle" fill="#e06b6b" font-size="11" font-weight="600">④ redis.set</text>
  <text x="215" y="492" text-anchor="middle" fill="#888" font-size="10">TTL: 60s</text>

  <!-- Arrows for flow -->
  <line x1="160" y1="252" x2="160" y2="270" stroke="#6e9fd4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="160" y1="314" x2="105" y2="332" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr-hit)"/>
  <line x1="160" y1="314" x2="215" y2="332" stroke="#e06b6b" stroke-width="1.5" marker-end="url(#arr-miss)"/>
  <line x1="215" y1="376" x2="215" y2="394" stroke="#e06b6b" stroke-width="1.5" marker-end="url(#arr-miss)"/>
  <line x1="215" y1="438" x2="215" y2="456" stroke="#e06b6b" stroke-width="1.5" marker-end="url(#arr-miss)"/>

  <!-- ========== INVALIDATION DIAGRAM ========== -->
  <text x="620" y="190" text-anchor="middle" fill="#888" font-size="12" font-weight="600">Invalidación de Caché</text>

  <rect x="440" y="210" width="200" height="42" rx="6" fill="#222" stroke="#f0a05a" stroke-width="1"/>
  <text x="540" y="228" text-anchor="middle" fill="#f0a05a" font-size="11" font-weight="600">POST/PUT/DELETE /products</text>
  <text x="540" y="244" text-anchor="middle" fill="#888" font-size="10">Mutación de datos</text>

  <rect x="440" y="272" width="200" height="42" rx="6" fill="#222" stroke="#555" stroke-width="1"/>
  <text x="540" y="290" text-anchor="middle" fill="#e5e5e5" font-size="11" font-weight="600">Actualizar base de datos</text>
  <text x="540" y="306" text-anchor="middle" fill="#888" font-size="10">Prisma / Mongoose</text>

  <rect x="440" y="334" width="200" height="42" rx="6" fill="#2a1a1a" stroke="#e06b6b" stroke-width="1"/>
  <text x="540" y="352" text-anchor="middle" fill="#e06b6b" font-size="11" font-weight="600">redis.del("products:*")</text>
  <text x="540" y="366" text-anchor="middle" fill="#888" font-size="10">Invalidar claves afectadas</text>

  <rect x="440" y="396" width="200" height="42" rx="6" fill="#1a2a1a" stroke="#68A063" stroke-width="1"/>
  <text x="540" y="414" text-anchor="middle" fill="#68A063" font-size="11" font-weight="600">201 / 200 / 204</text>
  <text x="540" y="430" text-anchor="middle" fill="#888" font-size="10">Próximo GET → reconstruye caché</text>

  <line x1="540" y1="252" x2="540" y2="270" stroke="#f0a05a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="314" x2="540" y2="332" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="376" x2="540" y2="394" stroke="#e06b6b" stroke-width="1.5" marker-end="url(#arr-miss)"/>

  <!-- ========== LATENCY LEGEND ========== -->
  <rect x="700" y="210" width="220" height="140" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="810" y="232" text-anchor="middle" fill="#888" font-size="11" font-weight="600">Latencia típica</text>
  <rect x="718" y="245" width="12" height="12" rx="2" fill="#68A063"/>
  <text x="738" y="255" fill="#e5e5e5" font-size="11">Redis HIT</text>
  <text x="900" y="255" text-anchor="end" fill="#68A063" font-size="11" font-weight="600">0.1–2 ms</text>
  <rect x="718" y="267" width="12" height="12" rx="2" fill="#6e9fd4"/>
  <text x="738" y="277" fill="#e5e5e5" font-size="11">Redis SET (miss)</text>
  <text x="900" y="277" text-anchor="end" fill="#6e9fd4" font-size="11" font-weight="600">+0.5 ms</text>
  <rect x="718" y="289" width="12" height="12" rx="2" fill="#555"/>
  <text x="738" y="299" fill="#e5e5e5" font-size="11">PostgreSQL query</text>
  <text x="900" y="299" text-anchor="end" fill="#aaa" font-size="11" font-weight="600">5–200 ms</text>
  <rect x="718" y="311" width="12" height="12" rx="2" fill="#e06b6b"/>
  <text x="738" y="321" fill="#e5e5e5" font-size="11">Sin caché (DB solo)</text>
  <text x="900" y="321" text-anchor="end" fill="#e06b6b" font-size="11" font-weight="600">50–500 ms</text>
  <line x1="718" y1="336" x2="902" y2="336" stroke="#333" stroke-width="1"/>
  <text x="810" y="350" text-anchor="middle" fill="#555" font-size="10">Redis reduce latencia hasta 100×</text>

  <!-- ========== CACHE KEY CONVENTION ========== -->
  <rect x="700" y="372" width="220" height="110" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="810" y="393" text-anchor="middle" fill="#888" font-size="11" font-weight="600">Convención de claves Redis</text>
  <text x="718" y="412" fill="#68A063" font-size="10" font-family="monospace">products:all:p1:l20</text>
  <text x="718" y="428" fill="#6e9fd4" font-size="10" font-family="monospace">products:id:42</text>
  <text x="718" y="444" fill="#f0a05a" font-size="10" font-family="monospace">users:id:7:profile</text>
  <text x="718" y="460" fill="#e06b6b" font-size="10" font-family="monospace">categories:all</text>
  <text x="810" y="476" text-anchor="middle" fill="#555" font-size="10">recurso:variante:parámetros</text>
</svg>
