<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="480" fill="#1a1a1a" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#e5e5e5" font-size="18" font-weight="700">Patrones Redis con ioredis</text>
  <text x="480" y="58" text-anchor="middle" fill="#888" font-size="12">Estructuras de datos y comandos clave para APIs Node.js</text>

  <!-- ============ STRING ============ -->
  <rect x="40" y="80" width="200" height="120" rx="8" fill="#222" stroke="#e06b6b" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" fill="#e06b6b" font-size="12" font-weight="700">STRING</text>
  <text x="140" y="115" text-anchor="middle" fill="#555" font-size="10">Caché de respuestas JSON</text>
  <text x="56" y="135" fill="#e5e5e5" font-size="10" font-family="monospace">SET key value EX 60</text>
  <text x="56" y="150" fill="#e5e5e5" font-size="10" font-family="monospace">GET key</text>
  <text x="56" y="165" fill="#e5e5e5" font-size="10" font-family="monospace">DEL key</text>
  <text x="56" y="183" fill="#555" font-size="10">JSON.stringify / JSON.parse</text>

  <!-- ============ HASH ============ -->
  <rect x="260" y="80" width="200" height="120" rx="8" fill="#222" stroke="#6e9fd4" stroke-width="1.5"/>
  <text x="360" y="100" text-anchor="middle" fill="#6e9fd4" font-size="12" font-weight="700">HASH</text>
  <text x="360" y="115" text-anchor="middle" fill="#555" font-size="10">Objeto con campos individuales</text>
  <text x="276" y="135" fill="#e5e5e5" font-size="10" font-family="monospace">HSET user:1 name "Ana"</text>
  <text x="276" y="150" fill="#e5e5e5" font-size="10" font-family="monospace">HGET user:1 name</text>
  <text x="276" y="165" fill="#e5e5e5" font-size="10" font-family="monospace">HGETALL user:1</text>
  <text x="276" y="183" fill="#555" font-size="10">Actualizar campo sin reescribir todo</text>

  <!-- ============ LIST ============ -->
  <rect x="480" y="80" width="200" height="120" rx="8" fill="#222" stroke="#68A063" stroke-width="1.5"/>
  <text x="580" y="100" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">LIST</text>
  <text x="580" y="115" text-anchor="middle" fill="#555" font-size="10">Cola de tareas / historial</text>
  <text x="496" y="135" fill="#e5e5e5" font-size="10" font-family="monospace">RPUSH queue taskId</text>
  <text x="496" y="150" fill="#e5e5e5" font-size="10" font-family="monospace">LPOP queue</text>
  <text x="496" y="165" fill="#e5e5e5" font-size="10" font-family="monospace">LRANGE queue 0 9</text>
  <text x="496" y="183" fill="#555" font-size="10">FIFO: RPUSH + LPOP</text>

  <!-- ============ SET ============ -->
  <rect x="700" y="80" width="220" height="120" rx="8" fill="#222" stroke="#f0a05a" stroke-width="1.5"/>
  <text x="810" y="100" text-anchor="middle" fill="#f0a05a" font-size="12" font-weight="700">SET</text>
  <text x="810" y="115" text-anchor="middle" fill="#555" font-size="10">Colección sin duplicados</text>
  <text x="716" y="135" fill="#e5e5e5" font-size="10" font-family="monospace">SADD online userId</text>
  <text x="716" y="150" fill="#e5e5e5" font-size="10" font-family="monospace">SREM online userId</text>
  <text x="716" y="165" fill="#e5e5e5" font-size="10" font-family="monospace">SMEMBERS online</text>
  <text x="716" y="183" fill="#555" font-size="10">Usuarios activos en sala</text>

  <!-- ========== IOREDIS CONNECTION CODE ========== -->
  <rect x="40" y="220" width="420" height="160" rx="8" fill="#1a1a2a" stroke="#6e9fd4" stroke-width="1"/>
  <text x="60" y="240" fill="#6e9fd4" font-size="11" font-weight="600">Conexión con ioredis (TypeScript)</text>
  <text x="60" y="258" fill="#888" font-size="10" font-family="monospace">import Redis from 'ioredis';</text>
  <text x="60" y="274" fill="#888" font-size="10" font-family="monospace">import { env } from '../config/env';</text>
  <text x="60" y="295" fill="#e5e5e5" font-size="10" font-family="monospace">export const redis = new Redis(env.REDIS_URL, {</text>
  <text x="60" y="311" fill="#555" font-size="10" font-family="monospace">  maxRetriesPerRequest: 3,</text>
  <text x="60" y="327" fill="#555" font-size="10" font-family="monospace">  retryStrategy: (times) =&gt; Math.min(times * 50, 2000),</text>
  <text x="60" y="343" fill="#555" font-size="10" font-family="monospace">  lazyConnect: true,</text>
  <text x="60" y="359" fill="#e5e5e5" font-size="10" font-family="monospace">});</text>

  <!-- ========== CACHE MIDDLEWARE CODE ========== -->
  <rect x="480" y="220" width="440" height="160" rx="8" fill="#1a2a1a" stroke="#68A063" stroke-width="1"/>
  <text x="500" y="240" fill="#68A063" font-size="11" font-weight="600">Middleware cache-aside</text>
  <text x="500" y="258" fill="#888" font-size="10" font-family="monospace">export function cacheMiddleware(ttl = 60) {</text>
  <text x="500" y="274" fill="#888" font-size="10" font-family="monospace">  return async (req, res, next) =&gt; {</text>
  <text x="500" y="290" fill="#e5e5e5" font-size="10" font-family="monospace">    const key = `${req.path}:${JSON.stringify(req.query)}`;</text>
  <text x="500" y="306" fill="#e5e5e5" font-size="10" font-family="monospace">    const cached = await redis.get(key);</text>
  <text x="500" y="322" fill="#68A063" font-size="10" font-family="monospace">    if (cached) return res.json(JSON.parse(cached));</text>
  <text x="500" y="338" fill="#555" font-size="10" font-family="monospace">    res.sendResponse = res.json.bind(res);</text>
  <text x="500" y="354" fill="#555" font-size="10" font-family="monospace">    // intercept res.json → set en Redis</text>
  <text x="500" y="370" fill="#888" font-size="10" font-family="monospace">  };</text>

  <!-- ========== TTL VISUAL ========== -->
  <rect x="40" y="400" width="420" height="62" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="60" y="420" fill="#888" font-size="11" font-weight="600">TTL recomendados por tipo de dato</text>
  <text x="60" y="438" fill="#e06b6b" font-size="10" font-family="monospace">productos / categorías:</text>
  <text x="200" y="438" fill="#888" font-size="10" font-family="monospace">300s (5 min)</text>
  <text x="340" y="438" fill="#6e9fd4" font-size="10" font-family="monospace">perfil usuario:</text>
  <text x="430" y="438" fill="#888" font-size="10" font-family="monospace">60s</text>
  <text x="60" y="453" fill="#68A063" font-size="10" font-family="monospace">listados / feeds:</text>
  <text x="200" y="453" fill="#888" font-size="10" font-family="monospace">30s</text>
  <text x="340" y="453" fill="#f0a05a" font-size="10" font-family="monospace">datos volátiles:</text>
  <text x="430" y="453" fill="#888" font-size="10" font-family="monospace">10s</text>

  <!-- ========== INVALIDATION PATTERNS ========== -->
  <rect x="480" y="400" width="440" height="62" rx="8" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="500" y="420" fill="#888" font-size="11" font-weight="600">Patrones de invalidación</text>
  <text x="500" y="438" fill="#e06b6b" font-size="10" font-family="monospace">redis.del('products:all')</text>
  <text x="700" y="438" fill="#555" font-size="10">→ clave única</text>
  <text x="500" y="453" fill="#f0a05a" font-size="10" font-family="monospace">unlink(await redis.keys('products:*'))</text>
  <text x="700" y="453" fill="#555" font-size="10">→ patrón glob</text>
</svg>
