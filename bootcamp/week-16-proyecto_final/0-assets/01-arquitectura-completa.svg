  <rect x="290" y="262" width="380" height="38" rx="6" fill="#1d281d" stroke="#68A063" stroke-width="1.5"/>
  <text x="480" y="286" fill="#d0e8d0" font-size="13" text-anchor="middle">Controller — req / res handling</text>
  <text x="276" y="286" fill="#555" font-size="10" text-anchor="end">Sem. 03</text>

  <line x1="480" y1="300" x2="480" y2="312" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SERVICE -->
  <rect x="290" y="312" width="380" height="38" rx="6" fill="#1d281d" stroke="#68A063" stroke-width="1.5"/>
  <text x="480" y="336" fill="#d0e8d0" font-size="13" text-anchor="middle">Service — business logic</text>
  <text x="276" y="336" fill="#555" font-size="10" text-anchor="end">Sem. 03</text>

  <line x1="480" y1="350" x2="480" y2="362" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

