  <rect x="290" y="162" width="380" height="38" rx="6" fill="#1d281d" stroke="#68A063" stroke-width="1.5"/>
  <text x="480" y="186" fill="#d0e8d0" font-size="13" text-anchor="middle">Router — Express Routes</text>
  <text x="276" y="186" fill="#555" font-size="10" text-anchor="end">Sem. 02–03</text>

  <line x1="480" y1="200" x2="480" y2="212" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

