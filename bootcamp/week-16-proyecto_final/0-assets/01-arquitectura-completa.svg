  <rect x="200" y="420" width="180" height="46" rx="6" fill="#1a2520" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="440" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">PostgreSQL / MongoDB</text>
  <text x="290" y="457" fill="#666" font-size="11" text-anchor="middle">Prisma · Mongoose · Sem. 05–06</text>

  <rect x="390" y="420" width="180" height="46" rx="6" fill="#251a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="440" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">Redis</text>
  <text x="480" y="457" fill="#666" font-size="11" text-anchor="middle">Cache · Sesiones · Sem. 12</text>

  <rect x="580" y="420" width="180" height="46" rx="6" fill="#1a1a25" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="670" y="440" fill="#8b5cf6" font-size="12" font-weight="600" text-anchor="middle">S3 / Cloudinary</text>
  <text x="670" y="457" fill="#666" font-size="11" text-anchor="middle">Files · Emails · Sem. 10</text>

  <!-- ── Right: Transversal concerns panel ── -->
  <rect x="694" y="62" width="246" height="258" rx="6" fill="#202020" stroke="#333" stroke-width="1"/>
  <text x="817" y="84" fill="#aaa" font-size="12" font-weight="600" text-anchor="middle">Concerns Transversales</text>
  <line x1="704" y1="90" x2="930" y2="90" stroke="#333" stroke-width="1"/>
  <text x="708" y="110" fill="#777" font-size="11">📝  Logging — Winston · Sem. 15</text>
  <text x="708" y="130" fill="#777" font-size="11">📊  Monitoring — Logtail · Sem. 15</text>
  <text x="708" y="150" fill="#777" font-size="11">🧪  Testing — Jest + Supertest · Sem. 09</text>
  <text x="708" y="170" fill="#777" font-size="11">📚  Docs — OpenAPI/Swagger · Sem. 13</text>
  <text x="708" y="190" fill="#777" font-size="11">🔌  WebSockets — Socket.io · Sem. 11</text>
  <text x="708" y="210" fill="#777" font-size="11">📧  Email — Nodemailer · Sem. 10</text>
  <text x="708" y="230" fill="#777" font-size="11">🐳  Docker — multi-stage · Sem. 14</text>
  <text x="708" y="250" fill="#777" font-size="11">🚀  CI/CD — GitHub Actions · Sem. 15</text>
  <text x="708" y="270" fill="#777" font-size="11">🔐  Zod — validación · Sem. 04</text>
  <text x="708" y="290" fill="#777" font-size="11">🗂️  RBAC — autorización · Sem. 08</text>
  <text x="708" y="310" fill="#777" font-size="11">🔑  JWT — autenticación · Sem. 07</text>

  <!-- ── Response path (left dashed arc) ── -->
  <path d="M 285 400 Q 200 260 285 100" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="190" y="256" fill="#444" font-size="10" text-anchor="middle" transform="rotate(-90,190,256)">← HTTP Response</text>

  <!-- Footer -->
  <text x="480" y="535" fill="#333" font-size="10" text-anchor="middle">bootcamp/week-16-proyecto_final · Express 5 + TypeScript 5 + Prisma + JWT · Node.js 22</text>
</svg>
