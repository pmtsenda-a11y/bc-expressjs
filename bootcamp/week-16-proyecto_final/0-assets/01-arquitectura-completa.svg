  <rect x="290" y="112" width="380" height="38" rx="6" fill="#1d281d" stroke="#68A063" stroke-width="1.5"/>
  <text x="480" y="136" fill="#d0e8d0" font-size="13" text-anchor="middle">Seguridad — Helmet · CORS · Rate Limit</text>
  <text x="276" y="136" fill="#555" font-size="10" text-anchor="end">Sem. 08</text>

  <line x1="480" y1="150" x2="480" y2="162" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

