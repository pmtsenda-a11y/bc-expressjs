  <rect x="290" y="212" width="380" height="38" rx="6" fill="#1d281d" stroke="#68A063" stroke-width="1.5"/>
  <text x="480" y="236" fill="#d0e8d0" font-size="13" text-anchor="middle">Middleware — authenticate · validate · error</text>
  <text x="276" y="236" fill="#555" font-size="10" text-anchor="end">Sem. 04–07</text>

  <line x1="480" y1="250" x2="480" y2="262" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

