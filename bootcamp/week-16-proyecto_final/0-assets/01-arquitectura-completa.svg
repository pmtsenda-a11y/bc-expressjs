  <text x="480" y="386" fill="#d0e8d0" font-size="13" text-anchor="middle">Repository — data access (Prisma / Mongoose)</text>
  <text x="276" y="386" fill="#555" font-size="10" text-anchor="end">Sem. 05–06</text>

  <!-- Dashed lines to stores -->
  <line x1="380" y1="400" x2="310" y2="420" stroke="#444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <line x1="480" y1="400" x2="480" y2="420" stroke="#444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <line x1="580" y1="400" x2="650" y2="420" stroke="#444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>

