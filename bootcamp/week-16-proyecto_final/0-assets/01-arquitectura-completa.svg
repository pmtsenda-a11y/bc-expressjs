<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#68A063"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="30" fill="#e0e0e0" font-size="17" font-weight="700" text-anchor="middle">Arquitectura Completa — Express REST API</text>
  <text x="480" y="50" fill="#666" font-size="11" text-anchor="middle">Semana 16 · Proyecto Final Integrador · Todos los conceptos en contexto</text>

  <!-- ── Left: request path label ─────────────────────── -->
  <text x="16" y="285" fill="#555" font-size="11" transform="rotate(-90,16,285)">HTTP Request →</text>
  <line x1="26" y1="72" x2="26" y2="430" stroke="#2d2d2d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── LAYER BOXES (centered x=290..670, 380px wide) ── -->

  <!-- CLIENT -->
  <rect x="290" y="62" width="380" height="38" rx="6" fill="#252525" stroke="#68A063" stroke-width="2"/>
  <text x="480" y="86" fill="#68A063" font-size="13" font-weight="700" text-anchor="middle">Cliente — Browser / Mobile / Postman</text>
  <text x="276" y="85" fill="#555" font-size="10" text-anchor="end">——</text>

  <line x1="480" y1="100" x2="480" y2="112" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

