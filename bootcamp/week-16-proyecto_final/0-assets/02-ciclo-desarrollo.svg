<svg viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#68A063"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="960" height="400" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="30" fill="#e0e0e0" font-size="16" font-weight="700" text-anchor="middle">Ciclo de Desarrollo — Del Código a Producción</text>
  <text x="480" y="50" fill="#666" font-size="11" text-anchor="middle">Semana 16 · Proyecto Final</text>

  <!-- Phase boxes: 7 phases horizontal layout -->
  <!-- Phase widths: each ~110px wide, 20px gap, total ~( 7*110 + 6*20 ) = 890, margin ~35 each side -->

  <!-- 1: PLANIFICAR -->
  <rect x="35" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="90" y="112" fill="#68A063" font-size="22" text-anchor="middle">📋</text>
  <text x="90" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">Planificar</text>
  <text x="90" y="168" fill="#555" font-size="10" text-anchor="middle">Dominio</text>
  <text x="90" y="180" fill="#555" font-size="10" text-anchor="middle">Arquitectura</text>
  <text x="90" y="192" fill="#555" font-size="10" text-anchor="middle">Schema Prisma</text>

  <line x1="145" y1="115" x2="165" y2="115" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2: IMPLEMENTAR -->
  <rect x="165" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="220" y="112" fill="#68A063" font-size="22" text-anchor="middle">⌨️</text>
  <text x="220" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">Implementar</text>
  <text x="220" y="168" fill="#555" font-size="10" text-anchor="middle">Routes/Controllers</text>
  <text x="220" y="180" fill="#555" font-size="10" text-anchor="middle">Services/Repos</text>
  <text x="220" y="192" fill="#555" font-size="10" text-anchor="middle">Auth + RBAC</text>

  <line x1="275" y1="115" x2="295" y2="115" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3: TESTEAR -->
  <rect x="295" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="350" y="112" fill="#68A063" font-size="22" text-anchor="middle">🧪</text>
  <text x="350" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">Testear</text>
  <text x="350" y="168" fill="#555" font-size="10" text-anchor="middle">Jest + Supertest</text>
  <text x="350" y="180" fill="#555" font-size="10" text-anchor="middle">Unit / Integration</text>
  <text x="350" y="192" fill="#555" font-size="10" text-anchor="middle">Edge cases</text>

  <line x1="405" y1="115" x2="425" y2="115" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4: REVISAR (PR) -->
  <rect x="425" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="480" y="112" fill="#68A063" font-size="22" text-anchor="middle">👁️</text>
  <text x="480" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">Code Review</text>
  <text x="480" y="168" fill="#555" font-size="10" text-anchor="middle">Pull Request</text>
  <text x="480" y="180" fill="#555" font-size="10" text-anchor="middle">Checklist</text>
  <text x="480" y="192" fill="#555" font-size="10" text-anchor="middle">Feedback</text>

  <line x1="535" y1="115" x2="555" y2="115" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5: CI/CD -->
  <rect x="555" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="610" y="112" fill="#68A063" font-size="22" text-anchor="middle">⚙️</text>
  <text x="610" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">CI / CD</text>
  <text x="610" y="168" fill="#555" font-size="10" text-anchor="middle">GitHub Actions</text>
  <text x="610" y="180" fill="#555" font-size="10" text-anchor="middle">Build + Test</text>
  <text x="610" y="192" fill="#555" font-size="10" text-anchor="middle">Docker build</text>

  <line x1="665" y1="115" x2="685" y2="115" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6: DESPLEGAR -->
  <rect x="685" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="740" y="112" fill="#68A063" font-size="22" text-anchor="middle">🚀</text>
  <text x="740" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">Desplegar</text>
  <text x="740" y="168" fill="#555" font-size="10" text-anchor="middle">Railway / Render</text>
  <text x="740" y="180" fill="#555" font-size="10" text-anchor="middle">Auto-deploy</text>
  <text x="740" y="192" fill="#555" font-size="10" text-anchor="middle">Health check</text>

  <line x1="795" y1="115" x2="815" y2="115" stroke="#68A063" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7: MONITOREAR -->
  <rect x="815" y="80" width="110" height="70" rx="8" fill="#1d281d" stroke="#68A063" stroke-width="2"/>
  <text x="870" y="112" fill="#68A063" font-size="22" text-anchor="middle">📊</text>
  <text x="870" y="134" fill="#d0e8d0" font-size="12" font-weight="600" text-anchor="middle">Monitorear</text>
  <text x="870" y="168" fill="#555" font-size="10" text-anchor="middle">Winston logs</text>
  <text x="870" y="180" fill="#555" font-size="10" text-anchor="middle">Logtail alerts</text>
  <text x="870" y="192" fill="#555" font-size="10" text-anchor="middle">/health endpoint</text>

  <!-- Continuous feedback loop arc (bottom) -->
  <path d="M 870 200 Q 870 280 480 300 Q 90 280 90 200" fill="none" stroke="#68A063" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="480" y="320" fill="#555" font-size="11" text-anchor="middle">↺  Mejora continua — cada iteración agrega valor</text>

  <!-- Failure path from CI -->
  <path d="M 610 150 Q 610 230 480 240 Q 350 250 350 200" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="530" y="255" fill="#ef4444" font-size="10" text-anchor="middle">Tests fail → fix → push again</text>

  <!-- Week reference row -->
  <text x="90"  y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 16</text>
  <text x="220" y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 02–08</text>
  <text x="350" y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 09</text>
  <text x="480" y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 16</text>
  <text x="610" y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 15</text>
  <text x="740" y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 14–15</text>
  <text x="870" y="360" fill="#444" font-size="10" text-anchor="middle">Sem. 15</text>

  <!-- Footer -->
  <text x="480" y="385" fill="#333" font-size="10" text-anchor="middle">bootcamp/week-16-proyecto_final</text>
</svg>
