<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="500" fill="#111111"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#68A063" font-size="17" font-weight="700">Anatomía de un endpoint documentado con @openapi</text>

  <!-- Left panel: JSDoc source -->
  <rect x="20" y="56" width="430" height="420" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="235" y="78" text-anchor="middle" fill="#888" font-size="12" font-weight="600">routes/product.routes.ts</text>

  <!-- Code lines -->
  <text x="36" y="100" fill="#555" font-size="10">/**</text>
  <text x="36" y="116" fill="#555" font-size="10"> * @openapi</text>
  <text x="36" y="132" fill="#e0ad4e" font-size="10"> * /api/v1/products/{id}:</text>
  <text x="36" y="148" fill="#555" font-size="10"> *   get:</text>

  <rect x="32" y="152" width="406" height="16" rx="2" fill="#1b3a1b" opacity="0.5"/>
  <text x="36" y="164" fill="#68A063" font-size="10"> *     tags: [Products]</text>

  <rect x="32" y="168" width="406" height="16" rx="2" fill="#2a2010" opacity="0.5"/>
  <text x="36" y="180" fill="#e0c070" font-size="10"> *     summary: Get product by ID</text>

  <rect x="32" y="184" width="406" height="48" rx="2" fill="#1a2a3a" opacity="0.5"/>
  <text x="36" y="196" fill="#6ab0e0" font-size="10"> *     parameters:</text>
  <text x="36" y="210" fill="#6ab0e0" font-size="10"> *       - in: path</text>
  <text x="36" y="224" fill="#6ab0e0" font-size="10"> *         name: id  schema: {type: string}  required: true</text>

  <rect x="32" y="232" width="406" height="32" rx="2" fill="#2a1a3a" opacity="0.5"/>
  <text x="36" y="244" fill="#cc88ff" font-size="10"> *     security:</text>
  <text x="36" y="258" fill="#cc88ff" font-size="10"> *       - BearerAuth: []</text>

  <rect x="32" y="264" width="406" height="88" rx="2" fill="#2a2a1a" opacity="0.5"/>
  <text x="36" y="276" fill="#cccc66" font-size="10"> *     responses:</text>
  <text x="36" y="290" fill="#cccc66" font-size="10"> *       200:</text>
  <text x="36" y="304" fill="#cccc66" font-size="10"> *         description: Product found</text>
  <text x="36" y="318" fill="#cccc66" font-size="10"> *         content:</text>
  <text x="36" y="332" fill="#cccc66" font-size="10"> *           application/json:</text>
  <text x="36" y="346" fill="#cccc66" font-size="10"> *             schema: {$ref: '#/components/schemas/Product'}</text>

  <rect x="32" y="352" width="406" height="32" rx="2" fill="#3a1a1a" opacity="0.5"/>
  <text x="36" y="364" fill="#e08080" font-size="10"> *       404: {description: Product not found,</text>
  <text x="36" y="378" fill="#e08080" font-size="10"> *              content: {$ref: '#/components/responses/NotFound'}}</text>

  <text x="36" y="400" fill="#555" font-size="10"> */</text>
  <text x="36" y="416" fill="#88cc88" font-size="10">router.get('/:id', productController.getById);</text>
  <text x="36" y="436" fill="#555" font-size="10">// ↑ La ruta funciona independientemente del JSDoc</text>
  <text x="36" y="452" fill="#555" font-size="10">// ↑ swagger-jsdoc solo lee el comentario, no modifica el handler</text>

  <!-- Divider -->
  <line x1="476" y1="60" x2="476" y2="476" stroke="#333" stroke-width="1.5"/>

  <!-- Right panel: Swagger UI output -->
  <rect x="490" y="56" width="450" height="420" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="715" y="78" text-anchor="middle" fill="#888" font-size="12" font-weight="600">Swagger UI — resultado visual</text>

  <!-- Endpoint bar -->
  <rect x="506" y="90" width="418" height="28" rx="4" fill="#1b3a1b"/>
  <rect x="512" y="95" width="38" height="17" rx="2" fill="#68A063"/>
  <text x="531" y="107" text-anchor="middle" fill="#111" font-size="9" font-weight="700">GET</text>
  <text x="558" y="107" fill="#cccccc" font-size="10">/api/v1/products/{id}</text>
  <text x="800" y="107" fill="#aaaaaa" font-size="9">Get product by ID</text>

  <!-- Tags annotation -->
  <rect x="506" y="126" width="418" height="20" rx="3" fill="#222"/>
  <rect x="512" y="129" width="60" height="14" rx="2" fill="#1b3a1b" stroke="#68A063" stroke-width="1"/>
  <text x="542" y="140" text-anchor="middle" fill="#68A063" font-size="9">Products</text>

  <!-- Security lock -->
  <rect x="780" y="129" width="80" height="14" rx="2" fill="#2a1a3a" stroke="#cc88ff" stroke-width="1"/>
  <text x="820" y="140" text-anchor="middle" fill="#cc88ff" font-size="9">🔒 BearerAuth</text>

  <!-- Parameters section -->
  <rect x="506" y="154" width="418" height="70" rx="3" fill="#222"/>
  <text x="516" y="170" fill="#6ab0e0" font-size="10" font-weight="600">Parameters</text>
  <rect x="516" y="176" width="396" height="40" rx="2" fill="#1a2a3a"/>
  <text x="526" y="191" fill="#aaaaaa" font-size="9">Name</text>
  <text x="616" y="191" fill="#aaaaaa" font-size="9">In</text>
  <text x="666" y="191" fill="#aaaaaa" font-size="9">Type</text>
  <text x="736" y="191" fill="#aaaaaa" font-size="9">Required</text>
  <text x="816" y="191" fill="#aaaaaa" font-size="9">Description</text>
  <line x1="516" y1="196" x2="912" y2="196" stroke="#333" stroke-width="1"/>
  <text x="526" y="209" fill="#cccccc" font-size="9">id</text>
  <text x="616" y="209" fill="#88cc88" font-size="9">path</text>
  <text x="666" y="209" fill="#cccccc" font-size="9">string</text>
  <text x="736" y="209" fill="#e08080" font-size="9">✓</text>
  <text x="816" y="209" fill="#888" font-size="9">Product identifier</text>

  <!-- Responses section -->
  <rect x="506" y="232" width="418" height="136" rx="3" fill="#222"/>
  <text x="516" y="248" fill="#cccc66" font-size="10" font-weight="600">Responses</text>

  <!-- 200 response -->
  <rect x="516" y="254" width="396" height="48" rx="2" fill="#1b3a1b"/>
  <text x="526" y="270" fill="#68A063" font-size="10" font-weight="700">200</text>
  <text x="570" y="270" fill="#cccccc" font-size="9">Product found</text>
  <text x="526" y="286" fill="#aaaaaa" font-size="9">Schema: $ref → Product</text>
  <text x="526" y="298" fill="#555" font-size="9">{ "id": "cjx...", "name": "Laptop", "price": 999.99, "stock": 10 }</text>

  <!-- 404 response -->
  <rect x="516" y="308" width="396" height="50" rx="2" fill="#3a1a1a"/>
  <text x="526" y="324" fill="#e08080" font-size="10" font-weight="700">404</text>
  <text x="570" y="324" fill="#cccccc" font-size="9">Product not found</text>
  <text x="526" y="340" fill="#aaaaaa" font-size="9">Schema: $ref → Error</text>
  <text x="526" y="354" fill="#555" font-size="9">{ "error": "Product not found" }</text>

  <!-- Try it out button -->
  <rect x="506" y="376" width="418" height="50" rx="3" fill="#222"/>
  <rect x="516" y="385" width="100" height="24" rx="4" fill="#1b3a1b" stroke="#68A063" stroke-width="1.5"/>
  <text x="566" y="401" text-anchor="middle" fill="#68A063" font-size="10" font-weight="700">Try it out ▶</text>
  <text x="630" y="400" fill="#555" font-size="9">Permite probar el endpoint directamente desde el navegador</text>
  <text x="630" y="414" fill="#555" font-size="9">incluyendo autenticación con el token Bearer</text>

  <!-- Legend annotations (arrows from left to right) -->
  <line x1="455" y1="160" x2="500" y2="133" stroke="#68A063" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="455" y1="216" x2="500" y2="190" stroke="#6ab0e0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="455" y1="250" x2="500" y2="250" stroke="#cc88ff" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="455" y1="300" x2="500" y2="270" stroke="#cccc66" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom caption -->
  <text x="480" y="490" text-anchor="middle" fill="#555" font-size="11">El campo summary se muestra en el panel colapsado · tags agrupa endpoints en la UI · $ref evita repetir schemas</text>
</svg>
