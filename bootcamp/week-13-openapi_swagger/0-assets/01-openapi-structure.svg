<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="540" fill="#111111"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#68A063" font-size="18" font-weight="700">Estructura de un documento OpenAPI 3.x</text>

  <!-- Root document box -->
  <rect x="30" y="58" width="180" height="46" rx="6" fill="#1a1a1a" stroke="#68A063" stroke-width="2"/>
  <text x="120" y="77" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">openapi.yaml / .json</text>
  <text x="120" y="95" text-anchor="middle" fill="#aaaaaa" font-size="11">openapi: "3.1.0"</text>

  <!-- Arrow down from root -->
  <line x1="120" y1="104" x2="120" y2="130" stroke="#555" stroke-width="1.5"/>
  <polygon points="120,130 115,120 125,120" fill="#555"/>

  <!-- info block -->
  <rect x="30" y="130" width="180" height="70" rx="6" fill="#1e2a1e" stroke="#68A063" stroke-width="1.5"/>
  <text x="120" y="150" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">info</text>
  <text x="120" y="167" text-anchor="middle" fill="#aaaaaa" font-size="10">title: My API</text>
  <text x="120" y="181" text-anchor="middle" fill="#aaaaaa" font-size="10">version: 1.0.0</text>
  <text x="120" y="195" text-anchor="middle" fill="#aaaaaa" font-size="10">description: ...</text>

  <!-- servers block -->
  <rect x="30" y="220" width="180" height="58" rx="6" fill="#1e2a1e" stroke="#68A063" stroke-width="1.5"/>
  <text x="120" y="240" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">servers</text>
  <text x="120" y="257" text-anchor="middle" fill="#aaaaaa" font-size="10">- url: http://localhost:3000</text>
  <text x="120" y="271" text-anchor="middle" fill="#aaaaaa" font-size="10">- url: https://api.example.com</text>

  <!-- tags block -->
  <rect x="30" y="298" width="180" height="56" rx="6" fill="#1e2a1e" stroke="#68A063" stroke-width="1.5"/>
  <text x="120" y="318" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">tags</text>
  <text x="120" y="335" text-anchor="middle" fill="#aaaaaa" font-size="10">- name: Products</text>
  <text x="120" y="349" text-anchor="middle" fill="#aaaaaa" font-size="10">- name: Auth</text>

  <!-- security block -->
  <rect x="30" y="374" width="180" height="50" rx="6" fill="#1e2a1e" stroke="#68A063" stroke-width="1.5"/>
  <text x="120" y="394" text-anchor="middle" fill="#68A063" font-size="12" font-weight="700">security</text>
  <text x="120" y="411" text-anchor="middle" fill="#aaaaaa" font-size="10">- BearerAuth: []</text>

  <!-- Connector lines from root to all sections -->
  <line x1="210" y1="81" x2="280" y2="81" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="81" x2="280" y2="460" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- paths block -->
  <rect x="290" y="58" width="280" height="194" rx="6" fill="#1a1a1a" stroke="#3d8b3d" stroke-width="2"/>
  <text x="430" y="80" text-anchor="middle" fill="#68A063" font-size="13" font-weight="700">paths</text>

  <!-- path entry 1 -->
  <rect x="306" y="90" width="248" height="70" rx="4" fill="#222" stroke="#3d8b3d" stroke-width="1"/>
  <text x="318" y="107" fill="#88cc88" font-size="11" font-weight="600">/api/v1/products</text>
  <text x="318" y="122" fill="#aaaaaa" font-size="10">  get:  summary, parameters, responses</text>
  <text x="318" y="136" fill="#aaaaaa" font-size="10">  post: summary, requestBody, responses</text>
  <text x="318" y="150" fill="#aaaaaa" font-size="10">  tags, security (por operación)</text>

  <!-- path entry 2 -->
  <rect x="306" y="170" width="248" height="70" rx="4" fill="#222" stroke="#3d8b3d" stroke-width="1"/>
  <text x="318" y="187" fill="#88cc88" font-size="11" font-weight="600">/api/v1/products/{id}</text>
  <text x="318" y="202" fill="#aaaaaa" font-size="10">  get:    summary, parameters (path), responses</text>
  <text x="318" y="216" fill="#aaaaaa" font-size="10">  put:    summary, requestBody, responses</text>
  <text x="318" y="230" fill="#aaaaaa" font-size="10">  delete: summary, responses (204)</text>

  <!-- components block -->
  <rect x="290" y="268" width="280" height="224" rx="6" fill="#1a1a1a" stroke="#b07d2a" stroke-width="2"/>
  <text x="430" y="290" text-anchor="middle" fill="#e0ad4e" font-size="13" font-weight="700">components</text>

  <!-- schemas -->
  <rect x="306" y="300" width="120" height="80" rx="4" fill="#222" stroke="#b07d2a" stroke-width="1"/>
  <text x="366" y="318" text-anchor="middle" fill="#e0ad4e" font-size="11" font-weight="600">schemas</text>
  <text x="318" y="333" fill="#aaaaaa" font-size="10">Product:</text>
  <text x="318" y="347" fill="#aaaaaa" font-size="10">  type: object</text>
  <text x="318" y="361" fill="#aaaaaa" font-size="10">  properties: ...</text>
  <text x="318" y="373" fill="#aaaaaa" font-size="10">Error: ...</text>

  <!-- securitySchemes -->
  <rect x="436" y="300" width="118" height="80" rx="4" fill="#222" stroke="#b07d2a" stroke-width="1"/>
  <text x="495" y="318" text-anchor="middle" fill="#e0ad4e" font-size="11" font-weight="600">securitySchemes</text>
  <text x="448" y="333" fill="#aaaaaa" font-size="10">BearerAuth:</text>
  <text x="448" y="347" fill="#aaaaaa" font-size="10">  type: http</text>
  <text x="448" y="361" fill="#aaaaaa" font-size="10">  scheme: bearer</text>
  <text x="448" y="375" fill="#aaaaaa" font-size="10">  bearerFormat: JWT</text>

  <!-- responses (reusable) -->
  <rect x="306" y="390" width="248" height="86" rx="4" fill="#222" stroke="#b07d2a" stroke-width="1"/>
  <text x="318" y="408" fill="#e0ad4e" font-size="11" font-weight="600">responses (reutilizables)</text>
  <text x="318" y="423" fill="#aaaaaa" font-size="10">NotFound:</text>
  <text x="318" y="437" fill="#aaaaaa" font-size="10">  description: Resource not found</text>
  <text x="318" y="451" fill="#aaaaaa" font-size="10">Unauthorized:</text>
  <text x="318" y="465" fill="#aaaaaa" font-size="10">  description: Missing or invalid token</text>

  <!-- $ref arrow: paths → components -->
  <line x1="430" y1="252" x2="430" y2="268" stroke="#b07d2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="430,268 425,258 435,258" fill="#b07d2a"/>
  <text x="470" y="263" fill="#b07d2a" font-size="10">$ref: '#/components/schemas/Product'</text>

  <!-- Right panel: output -->
  <rect x="600" y="58" width="338" height="424" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="769" y="82" text-anchor="middle" fill="#cccccc" font-size="13" font-weight="700">Swagger UI — resultado</text>

  <!-- Swagger UI mock -->
  <rect x="614" y="94" width="310" height="36" rx="4" fill="#1b3a1b"/>
  <text x="622" y="108" fill="#68A063" font-size="11" font-weight="700">My API</text>
  <text x="622" y="122" fill="#888" font-size="10">v1.0.0 — http://localhost:3000</text>

  <!-- Tag: Products -->
  <rect x="614" y="140" width="310" height="26" rx="3" fill="#2a2a2a" stroke="#68A063" stroke-width="1"/>
  <text x="624" y="157" fill="#68A063" font-size="11" font-weight="600">Products</text>

  <!-- GET /products -->
  <rect x="614" y="174" width="310" height="24" rx="2" fill="#1b3a1b"/>
  <rect x="620" y="178" width="38" height="16" rx="2" fill="#68A063"/>
  <text x="639" y="190" text-anchor="middle" fill="#111" font-size="9" font-weight="700">GET</text>
  <text x="666" y="190" fill="#cccccc" font-size="10">/api/v1/products</text>
  <text x="830" y="190" fill="#888" font-size="9">List all products</text>

  <!-- POST /products -->
  <rect x="614" y="204" width="310" height="24" rx="2" fill="#1a2a3a"/>
  <rect x="620" y="208" width="38" height="16" rx="2" fill="#4a8fc4"/>
  <text x="639" y="220" text-anchor="middle" fill="#111" font-size="9" font-weight="700">POST</text>
  <text x="666" y="220" fill="#cccccc" font-size="10">/api/v1/products</text>
  <text x="830" y="220" fill="#888" font-size="9">Create product</text>

  <!-- GET /products/{id} -->
  <rect x="614" y="234" width="310" height="24" rx="2" fill="#1b3a1b"/>
  <rect x="620" y="238" width="38" height="16" rx="2" fill="#68A063"/>
  <text x="639" y="250" text-anchor="middle" fill="#111" font-size="9" font-weight="700">GET</text>
  <text x="666" y="250" fill="#cccccc" font-size="10">/api/v1/products/{id}</text>
  <text x="840" y="250" fill="#888" font-size="9">Get by ID</text>

  <!-- PUT /products/{id} -->
  <rect x="614" y="264" width="310" height="24" rx="2" fill="#3a2a1a"/>
  <rect x="620" y="268" width="38" height="16" rx="2" fill="#c4874a"/>
  <text x="639" y="280" text-anchor="middle" fill="#111" font-size="9" font-weight="700">PUT</text>
  <text x="666" y="280" fill="#cccccc" font-size="10">/api/v1/products/{id}</text>
  <text x="840" y="280" fill="#888" font-size="9">Update product</text>

  <!-- DELETE /products/{id} -->
  <rect x="614" y="294" width="310" height="24" rx="2" fill="#3a1a1a"/>
  <rect x="620" y="298" width="48" height="16" rx="2" fill="#c44a4a"/>
  <text x="644" y="310" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">DELETE</text>
  <text x="676" y="310" fill="#cccccc" font-size="10">/api/v1/products/{id}</text>
  <text x="840" y="310" fill="#888" font-size="9">Delete product</text>

  <!-- Tag: Auth -->
  <rect x="614" y="330" width="310" height="26" rx="3" fill="#2a2a2a" stroke="#4a8fc4" stroke-width="1"/>
  <text x="624" y="347" fill="#4a8fc4" font-size="11" font-weight="600">Auth</text>

  <!-- POST /auth/login -->
  <rect x="614" y="364" width="310" height="24" rx="2" fill="#1a2a3a"/>
  <rect x="620" y="368" width="38" height="16" rx="2" fill="#4a8fc4"/>
  <text x="639" y="380" text-anchor="middle" fill="#111" font-size="9" font-weight="700">POST</text>
  <text x="666" y="380" fill="#cccccc" font-size="10">/api/v1/auth/login</text>
  <text x="840" y="380" fill="#888" font-size="9">Login</text>

  <!-- Authorize button -->
  <rect x="700" y="400" width="110" height="26" rx="4" fill="#1b3a1b" stroke="#68A063" stroke-width="1.5"/>
  <text x="755" y="417" text-anchor="middle" fill="#68A063" font-size="10" font-weight="700">🔒 Authorize</text>

  <!-- Arrow: left → right -->
  <line x1="570" y1="270" x2="600" y2="270" stroke="#444" stroke-width="1.5"/>
  <polygon points="600,270 591,265 591,275" fill="#444"/>

  <!-- Connector lines from root to sections -->
  <line x1="280" y1="155" x2="290" y2="155" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="360" x2="290" y2="360" stroke="#555" stroke-width="1.5"/>

  <!-- Bottom note -->
  <text x="480" y="515" text-anchor="middle" fill="#555" font-size="11">La spec OpenAPI puede exportarse como JSON/YAML desde  GET /api-docs.json</text>
</svg>
