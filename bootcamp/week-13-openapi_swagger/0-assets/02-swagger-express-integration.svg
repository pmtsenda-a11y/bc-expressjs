<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="480" fill="#111111"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#68A063" font-size="17" font-weight="700">Integración swagger-jsdoc + swagger-ui-express en Express</text>

  <!-- Step 1: Source files -->
  <rect x="30" y="64" width="190" height="160" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="125" y="86" text-anchor="middle" fill="#cccccc" font-size="12" font-weight="700">Código fuente (.ts)</text>

  <!-- File 1 -->
  <rect x="46" y="96" width="158" height="36" rx="4" fill="#222"/>
  <text x="56" y="109" fill="#88cc88" font-size="10">routes/product.routes.ts</text>
  <text x="56" y="123" fill="#aaaaaa" font-size="9">/** @openapi /products get ... */</text>

  <!-- File 2 -->
  <rect x="46" y="140" width="158" height="36" rx="4" fill="#222"/>
  <text x="56" y="153" fill="#88cc88" font-size="10">routes/auth.routes.ts</text>
  <text x="56" y="167" fill="#aaaaaa" font-size="9">/** @openapi /auth/login post ... */</text>

  <!-- File 3 -->
  <rect x="46" y="184" width="158" height="28" rx="4" fill="#222"/>
  <text x="56" y="197" fill="#88cc88" font-size="10">config/swagger.ts</text>
  <text x="56" y="209" fill="#aaaaaa" font-size="9">swaggerDefinition + apis glob</text>

  <!-- Step 2: swagger-jsdoc -->
  <rect x="270" y="104" width="170" height="84" rx="8" fill="#1b3a1b" stroke="#68A063" stroke-width="2"/>
  <text x="355" y="130" text-anchor="middle" fill="#68A063" font-size="13" font-weight="700">swagger-jsdoc</text>
  <text x="355" y="150" text-anchor="middle" fill="#aaaaaa" font-size="10">Lee los archivos de la</text>
  <text x="355" y="164" text-anchor="middle" fill="#aaaaaa" font-size="10">glob (apis: ['src/**/*.ts'])</text>
  <text x="355" y="178" text-anchor="middle" fill="#aaaaaa" font-size="10">y extrae los bloques @openapi</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="144" x2="268" y2="144" stroke="#68A063" stroke-width="2"/>
  <polygon points="268,144 258,139 258,149" fill="#68A063"/>

  <!-- Step 3: OpenAPI Spec JSON -->
  <rect x="490" y="94" width="180" height="104" rx="8" fill="#1a1a1a" stroke="#b07d2a" stroke-width="2"/>
  <text x="580" y="118" text-anchor="middle" fill="#e0ad4e" font-size="13" font-weight="700">OpenAPI Spec</text>
  <text x="510" y="138" fill="#aaaaaa" font-size="10">{ "openapi": "3.1.0",</text>
  <text x="510" y="153" fill="#aaaaaa" font-size="10">  "info": {...},</text>
  <text x="510" y="168" fill="#aaaaaa" font-size="10">  "paths": {...},</text>
  <text x="510" y="183" fill="#aaaaaa" font-size="10">  "components": {...} }</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="146" x2="488" y2="146" stroke="#e0ad4e" stroke-width="2"/>
  <polygon points="488,146 478,141 478,151" fill="#e0ad4e"/>
  <text x="462" y="140" text-anchor="middle" fill="#e0ad4e" font-size="9">swaggerSpec</text>

  <!-- Step 4: swagger-ui-express -->
  <rect x="270" y="256" width="170" height="94" rx="8" fill="#1a2a3a" stroke="#4a8fc4" stroke-width="2"/>
  <text x="355" y="280" text-anchor="middle" fill="#4a8fc4" font-size="12" font-weight="700">swagger-ui-express</text>
  <text x="355" y="298" text-anchor="middle" fill="#aaaaaa" font-size="10">app.use('/api-docs',</text>
  <text x="355" y="312" text-anchor="middle" fill="#aaaaaa" font-size="10">  swaggerUi.serve,</text>
  <text x="355" y="326" text-anchor="middle" fill="#aaaaaa" font-size="10">  swaggerUi.setup(swaggerSpec))</text>

  <!-- Arrow 3: spec → swagger-ui-express -->
  <line x1="580" y1="198" x2="580" y2="303" stroke="#4a8fc4" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="580" y1="303" x2="442" y2="303" stroke="#4a8fc4" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="442,303 452,298 452,308" fill="#4a8fc4"/>
  <text x="530" y="295" fill="#4a8fc4" font-size="9">swaggerSpec</text>

  <!-- Step 5: Browser -->
  <rect x="490" y="256" width="200" height="124" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="590" y="280" text-anchor="middle" fill="#cccccc" font-size="12" font-weight="700">Navegador</text>

  <!-- Browser mock -->
  <rect x="502" y="292" width="176" height="78" rx="4" fill="#1b3a1b" stroke="#68A063" stroke-width="1"/>
  <text x="590" y="310" text-anchor="middle" fill="#68A063" font-size="10" font-weight="700">My API — Swagger UI</text>
  <rect x="510" y="318" width="160" height="14" rx="2" fill="#222"/>
  <text x="590" y="329" text-anchor="middle" fill="#68A063" font-size="8">GET /api/v1/products</text>
  <rect x="510" y="338" width="160" height="14" rx="2" fill="#1a2a3a"/>
  <text x="590" y="349" text-anchor="middle" fill="#4a8fc4" font-size="8">POST /api/v1/products</text>
  <rect x="510" y="358" width="160" height="8" rx="2" fill="#222"/>

  <!-- Arrow 4: swagger-ui-express → browser -->
  <line x1="440" y1="303" x2="488" y2="303" stroke="#555" stroke-width="2"/>
  <polygon points="488,303 478,298 478,308" fill="#555"/>
  <text x="462" y="296" text-anchor="middle" fill="#888" font-size="9">HTTP GET</text>
  <text x="462" y="308" text-anchor="middle" fill="#888" font-size="9">/api-docs</text>

  <!-- Endpoints label -->
  <rect x="30" y="270" width="190" height="104" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="125" y="292" text-anchor="middle" fill="#cccccc" font-size="12" font-weight="700">Express app.ts</text>
  <text x="46" y="312" fill="#aaaaaa" font-size="10">import swaggerUi from</text>
  <text x="46" y="326" fill="#aaaaaa" font-size="10">  'swagger-ui-express'</text>
  <text x="46" y="340" fill="#aaaaaa" font-size="10">import swaggerSpec from</text>
  <text x="46" y="354" fill="#aaaaaa" font-size="10">  './config/swagger'</text>
  <text x="46" y="368" fill="#88cc88" font-size="10">app.use('/api-docs', ...)</text>

  <!-- Arrow from app to swagger-ui-express -->
  <line x1="220" y1="303" x2="268" y2="303" stroke="#555" stroke-width="2"/>
  <polygon points="268,303 258,298 258,308" fill="#555"/>

  <!-- Also /api-docs.json endpoint label -->
  <rect x="700" y="256" width="220" height="72" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="810" y="276" text-anchor="middle" fill="#888" font-size="11" font-weight="600">Spec disponible también como JSON</text>
  <text x="810" y="294" text-anchor="middle" fill="#aaaaaa" font-size="10">GET /api-docs.json</text>
  <text x="810" y="310" text-anchor="middle" fill="#aaaaaa" font-size="10">→ retorna el objeto OpenAPI completo</text>
  <text x="810" y="322" text-anchor="middle" fill="#aaaaaa" font-size="10">útil para integrar con herramientas externas</text>

  <!-- pnpm install note -->
  <rect x="700" y="344" width="220" height="56" rx="6" fill="#1a2a1a" stroke="#68A063" stroke-width="1"/>
  <text x="810" y="365" text-anchor="middle" fill="#68A063" font-size="11" font-weight="600">Instalación</text>
  <text x="810" y="382" text-anchor="middle" fill="#aaaaaa" font-size="10">pnpm add swagger-jsdoc@6.2.8</text>
  <text x="810" y="396" text-anchor="middle" fill="#aaaaaa" font-size="10">pnpm add swagger-ui-express@5.0.1</text>

  <!-- Bottom caption -->
  <text x="480" y="450" text-anchor="middle" fill="#555" font-size="11">swagger-jsdoc lee anotaciones JSDoc · swagger-ui-express sirve la UI · no se duplica código</text>
</svg>
