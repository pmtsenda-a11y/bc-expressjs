<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <!-- Background -->
  <rect width="960" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="36" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="bold" fill="#68A063" text-anchor="middle">Socket.io: Flujo de Autenticaci&#243;n JWT</text>

  <!-- ===================== CLIENT ===================== -->
  <rect x="40" y="65" width="160" height="370" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="bold" fill="#58a6ff" text-anchor="middle">Cliente</text>
  <text x="120" y="108" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">(browser/app)</text>

  <!-- Client: io() call -->
  <rect x="55" y="125" width="130" height="55" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="120" y="142" font-family="Inter,Arial,sans-serif" font-size="9" fill="#e6edf3" text-anchor="middle">io('http://...</text>
  <text x="120" y="155" font-family="Inter,Arial,sans-serif" font-size="9" fill="#e6edf3" text-anchor="middle">{ auth: {</text>
  <text x="120" y="167" font-family="Inter,Arial,sans-serif" font-size="9" fill="#f0883e" text-anchor="middle">   token: jwt</text>
  <text x="120" y="179" font-family="Inter,Arial,sans-serif" font-size="9" fill="#e6edf3" text-anchor="middle">} })</text>

  <!-- Client: connect event -->
  <rect x="55" y="310" width="130" height="38" rx="5" fill="#0d2a0d" stroke="#3fb950" stroke-width="1"/>
  <text x="120" y="327" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">on('connect')</text>
  <text x="120" y="342" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">&#10003; Autenticado</text>

  <!-- Client: connect_error -->
  <rect x="55" y="360" width="130" height="38" rx="5" fill="#3d1f00" stroke="#f78166" stroke-width="1"/>
  <text x="120" y="377" font-family="Inter,Arial,sans-serif" font-size="10" fill="#f78166" text-anchor="middle">on('connect_error')</text>
  <text x="120" y="392" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">&#10007; Token inv&#225;lido</text>

  <!-- ===================== AUTH MIDDLEWARE ===================== -->
  <rect x="270" y="65" width="200" height="370" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
  <text x="370" y="90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="bold" fill="#a371f7" text-anchor="middle">io.use()</text>
  <text x="370" y="108" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">auth.ws.middleware.ts</text>

  <!-- Middleware: extract token -->
  <rect x="285" y="125" width="170" height="40" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="142" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">1. Extraer token</text>
  <text x="370" y="157" font-family="Inter,Arial,sans-serif" font-size="9" fill="#f0883e" text-anchor="middle">socket.handshake.auth.token</text>

  <!-- Middleware: check exists -->
  <rect x="285" y="180" width="170" height="40" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="197" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">2. &#191;Existe token?</text>
  <text x="370" y="212" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">if (!token) return next(Error)</text>

  <!-- Middleware: jwt.verify -->
  <rect x="285" y="235" width="170" height="40" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="370" y="252" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">3. jwt.verify(token)</text>
  <text x="370" y="267" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">try / catch</text>

  <!-- Middleware: attach user -->
  <rect x="285" y="290" width="170" height="40" rx="5" fill="#0d2a0d" stroke="#3fb950" stroke-width="1"/>
  <text x="370" y="307" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">4. socket.data.user = payload</text>
  <text x="370" y="322" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">next() &#8594; permite conexi&#243;n</text>

  <!-- Middleware: reject -->
  <rect x="285" y="345" width="170" height="40" rx="5" fill="#3d1f00" stroke="#f78166" stroke-width="1"/>
  <text x="370" y="362" font-family="Inter,Arial,sans-serif" font-size="10" fill="#f78166" text-anchor="middle">5. next(new Error(...))</text>
  <text x="370" y="377" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">rechaza la conexi&#243;n</text>

  <!-- ===================== CONNECTION HANDLER ===================== -->
  <rect x="545" y="65" width="200" height="200" rx="8" fill="#161b22" stroke="#68A063" stroke-width="1.5"/>
  <text x="645" y="90" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="bold" fill="#68A063" text-anchor="middle">io.on('connection')</text>
  <text x="645" y="108" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">solo llegan sockets autenticados</text>

  <!-- Join personal room -->
  <rect x="560" y="120" width="170" height="40" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="645" y="137" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">socket.join('user:' + userId)</text>
  <text x="645" y="152" font-family="Inter,Arial,sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">Personal room asignado</text>

  <!-- Register handlers -->
  <rect x="560" y="175" width="170" height="40" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="645" y="192" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">registerHandlers(io, socket)</text>
  <text x="645" y="207" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Eventos del dominio</text>

  <!-- User data available -->
  <rect x="560" y="228" width="170" height="22" rx="4" fill="#0d2a0d" stroke="#3fb950" stroke-width="1"/>
  <text x="645" y="243" font-family="Inter,Arial,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">socket.data.user.userId / email / role</text>

  <!-- ===================== SERVICE ===================== -->
  <rect x="545" y="290" width="200" height="145" rx="8" fill="#161b22" stroke="#68A063" stroke-width="1.5"/>
  <text x="645" y="315" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="bold" fill="#68A063" text-anchor="middle">Servicio (REST)</text>
  <text x="645" y="333" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">items.service.ts / notifications.service.ts</text>

  <!-- Emit to personal room from service -->
  <rect x="560" y="348" width="170" height="40" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="645" y="364" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3" text-anchor="middle">io.to('user:'+userId)</text>
  <text x="645" y="379" font-family="Inter,Arial,sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">.emit('notification:new', data)</text>

  <rect x="560" y="400" width="170" height="22" rx="4" fill="#0d2a0d" stroke="#3fb950" stroke-width="1"/>
  <text x="645" y="415" font-family="Inter,Arial,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">Entregado en tiempo real si conectado</text>

  <!-- ===================== ARROWS ===================== -->
  <!-- Client → Middleware (connect attempt) -->
  <line x1="200" y1="155" x2="270" y2="155" stroke="#a371f7" stroke-width="2"/>
  <polygon points="270,155 259,149 259,161" fill="#a371f7"/>
  <text x="235" y="148" font-family="Inter,Arial,sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">handshake</text>

  <!-- Middleware accept → Connection handler -->
  <line x1="455" y1="310" x2="545" y2="160" stroke="#3fb950" stroke-width="1.5"/>
  <polygon points="545,160 535,168 547,172" fill="#3fb950"/>
  <text x="500" y="230" font-family="Inter,Arial,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">next()</text>

  <!-- Middleware reject → Client error -->
  <line x1="285" y1="365" x2="200" y2="378" stroke="#f78166" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="200,378 212,370 210,382" fill="#f78166"/>

  <!-- Connection handler → Service (io export) -->
  <line x1="645" y1="265" x2="645" y2="290" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="645,290 639,278 651,278" fill="#30363d"/>

  <!-- Service emit → Client receive -->
  <line x1="545" y1="370" x2="200" y2="330" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="200,330 214,327 210,339" fill="#a371f7"/>
  <text x="372" y="355" font-family="Inter,Arial,sans-serif" font-size="9" fill="#a371f7" text-anchor="middle">WebSocket event</text>

  <!-- ===================== LEGEND ===================== -->
  <rect x="770" y="65" width="160" height="370" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="850" y="88" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="bold" fill="#e6edf3" text-anchor="middle">Leyenda</text>

  <rect x="785" y="100" width="12" height="12" rx="2" fill="#a371f7"/>
  <text x="803" y="111" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3">Flujo de auth</text>

  <rect x="785" y="122" width="12" height="12" rx="2" fill="#3fb950"/>
  <text x="803" y="133" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3">Conexi&#243;n aceptada</text>

  <rect x="785" y="144" width="12" height="12" rx="2" fill="#f78166"/>
  <text x="803" y="155" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3">Conexi&#243;n rechazada</text>

  <line x1="785" y1="173" x2="797" y2="173" stroke="#a371f7" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="803" y="177" font-family="Inter,Arial,sans-serif" font-size="10" fill="#e6edf3">Evento WebSocket</text>

  <text x="850" y="210" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="bold" fill="#68A063" text-anchor="middle">Pasos clave:</text>

  <text x="785" y="228" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">1. Cliente env&#237;a token</text>
  <text x="785" y="244" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">   en handshake.auth</text>
  <text x="785" y="262" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">2. io.use() verifica JWT</text>
  <text x="785" y="280" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">3. payload &#8594; socket.data</text>
  <text x="785" y="298" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">4. join personal room</text>
  <text x="785" y="316" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">   user:${'{'}userId{'}'}</text>
  <text x="785" y="334" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">5. Servicios REST usan</text>
  <text x="785" y="352" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e">   io.to(room).emit()</text>
</svg>
