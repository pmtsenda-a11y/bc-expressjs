<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <!-- Background -->
  <rect width="960" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="38" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="bold" fill="#68A063" text-anchor="middle">HTTP Polling vs WebSocket Full-Duplex</text>

  <!-- === LEFT PANEL: HTTP Polling === -->
  <rect x="30" y="60" width="420" height="400" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="240" y="90" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="bold" fill="#e6edf3" text-anchor="middle">HTTP Polling (Ineficiente)</text>

  <!-- Client box left -->
  <rect x="60" y="110" width="100" height="40" rx="6" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="110" y="135" font-family="Inter,Arial,sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle">Cliente</text>

  <!-- Server box left -->
  <rect x="320" y="110" width="100" height="40" rx="6" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
  <text x="370" y="135" font-family="Inter,Arial,sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Servidor</text>

  <!-- Polling arrows (3 pairs) -->
  <!-- Request 1 -->
  <line x1="160" y1="165" x2="320" y2="185" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,185 308,176 310,188" fill="#58a6ff"/>
  <text x="240" y="171" font-family="Inter,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">GET /notifications</text>

  <!-- Response 1 (empty) -->
  <line x1="320" y1="198" x2="160" y2="215" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="160,215 172,206 170,218" fill="#8b949e"/>
  <text x="240" y="209" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">200 [] (vac&#237;o)</text>

  <!-- Request 2 -->
  <line x1="160" y1="238" x2="320" y2="258" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,258 308,249 310,261" fill="#58a6ff"/>
  <text x="240" y="244" font-family="Inter,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">GET /notifications (3s)</text>

  <!-- Response 2 (empty) -->
  <line x1="320" y1="271" x2="160" y2="288" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="160,288 172,279 170,291" fill="#8b949e"/>
  <text x="240" y="282" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">200 [] (vac&#237;o)</text>

  <!-- Request 3 -->
  <line x1="160" y1="310" x2="320" y2="330" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,330 308,321 310,333" fill="#58a6ff"/>
  <text x="240" y="316" font-family="Inter,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">GET /notifications (3s)</text>

  <!-- Response 3 (has data) -->
  <line x1="320" y1="343" x2="160" y2="360" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="160,360 172,351 170,363" fill="#3fb950"/>
  <text x="240" y="354" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">200 [notif] (finalmente!)</text>

  <!-- Waste label -->
  <rect x="50" y="375" width="400" height="28" rx="5" fill="#3d1f00"/>
  <text x="250" y="393" font-family="Inter,Arial,sans-serif" font-size="11" fill="#f78166" text-anchor="middle">&#9888; 2 de 3 requests son in&#250;tiles. Headers duplicados cada vez.</text>

  <!-- Time bracket left -->
  <line x1="48" y1="155" x2="48" y2="365" stroke="#30363d" stroke-width="1"/>
  <text x="44" y="265" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" transform="rotate(-90,44,265)">~9 segundos de espera</text>

  <!-- === RIGHT PANEL: WebSocket === -->
  <rect x="510" y="60" width="420" height="400" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="720" y="90" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="bold" fill="#e6edf3" text-anchor="middle">WebSocket Full-Duplex (Eficiente)</text>

  <!-- Client box right -->
  <rect x="540" y="110" width="100" height="40" rx="6" fill="#21262d" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="590" y="135" font-family="Inter,Arial,sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle">Cliente</text>

  <!-- Server box right -->
  <rect x="800" y="110" width="100" height="40" rx="6" fill="#21262d" stroke="#68A063" stroke-width="1.5"/>
  <text x="850" y="135" font-family="Inter,Arial,sans-serif" font-size="13" fill="#68A063" text-anchor="middle">Servidor</text>

  <!-- Handshake -->
  <line x1="640" y1="140" x2="800" y2="155" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="800,155 788,147 790,159" fill="#58a6ff"/>
  <text x="720" y="146" font-family="Inter,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">HTTP Upgrade (handshake)</text>

  <line x1="800" y1="168" x2="640" y2="183" stroke="#68A063" stroke-width="1.5"/>
  <polygon points="640,183 652,174 650,186" fill="#68A063"/>
  <text x="720" y="174" font-family="Inter,Arial,sans-serif" font-size="10" fill="#68A063" text-anchor="middle">101 Switching Protocols</text>

  <!-- Persistent connection bar -->
  <rect x="580" y="195" width="20" height="180" rx="3" fill="#1f4a1f"/>
  <rect x="840" y="195" width="20" height="180" rx="3" fill="#1f4a1f"/>
  <line x1="590" y1="195" x2="850" y2="195" stroke="#3fb950" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="590" y1="375" x2="850" y2="375" stroke="#3fb950" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="720" y="192" font-family="Inter,Arial,sans-serif" font-size="9" fill="#3fb950" text-anchor="middle">&#8213;&#8213;&#8213; socket TCP persistente &#8213;&#8213;&#8213;</text>

  <!-- Event 1: client to server -->
  <line x1="600" y1="230" x2="840" y2="245" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="840,245 828,237 830,249" fill="#58a6ff"/>
  <text x="720" y="232" font-family="Inter,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">emit('joinRoom', {room: 'general'})</text>

  <!-- Event 2: server to client (notification) -->
  <line x1="840" y1="278" x2="600" y2="293" stroke="#3fb950" stroke-width="2"/>
  <polygon points="600,293 612,284 610,296" fill="#3fb950"/>
  <text x="720" y="274" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">emit('notification:new', data)</text>

  <!-- Event 3: server pushes immediately -->
  <line x1="840" y1="318" x2="600" y2="333" stroke="#3fb950" stroke-width="2"/>
  <polygon points="600,333 612,324 610,336" fill="#3fb950"/>
  <text x="720" y="314" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">emit('message', data) &#8594; instant&#225;neo</text>

  <!-- Event 4: client to server -->
  <line x1="600" y1="355" x2="840" y2="370" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="840,370 828,362 830,374" fill="#58a6ff"/>
  <text x="720" y="351" font-family="Inter,Arial,sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">emit('sendMessage', {text: '...'})</text>

  <!-- Efficiency label -->
  <rect x="520" y="385" width="400" height="28" rx="5" fill="#0d2a0d"/>
  <text x="720" y="403" font-family="Inter,Arial,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle">&#10003; Una sola conexi&#243;n. El servidor env&#237;a datos inmediatamente.</text>
</svg>
