<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <!-- Background -->
  <rect width="960" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="36" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="bold" fill="#68A063" text-anchor="middle">Socket.io: Server &#8594; Namespaces &#8594; Rooms &#8594; Sockets</text>

  <!-- ===================== SERVER ===================== -->
  <rect x="370" y="55" width="220" height="50" rx="8" fill="#161b22" stroke="#68A063" stroke-width="2"/>
  <text x="480" y="77" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="bold" fill="#68A063" text-anchor="middle">io (Socket.io Server)</text>
  <text x="480" y="95" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">new Server(httpServer)</text>

  <!-- Connector from server to namespaces -->
  <line x1="340" y1="105" x2="240" y2="145" stroke="#30363d" stroke-width="1.5"/>
  <line x1="480" y1="105" x2="480" y2="145" stroke="#30363d" stroke-width="1.5"/>
  <line x1="620" y1="105" x2="720" y2="145" stroke="#30363d" stroke-width="1.5"/>

  <!-- ===================== NAMESPACES ===================== -->
  <!-- Default namespace -->
  <rect x="120" y="145" width="240" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="240" y="165" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Namespace: /</text>
  <text x="240" y="183" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">io.of('/') &#160;&#160;(por defecto)</text>

  <!-- Chat namespace -->
  <rect x="360" y="145" width="240" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="480" y="165" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Namespace: /chat</text>
  <text x="480" y="183" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">io.of('/chat')</text>

  <!-- Admin namespace -->
  <rect x="600" y="145" width="240" height="48" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="720" y="165" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Namespace: /admin</text>
  <text x="720" y="183" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">io.of('/admin')</text>

  <!-- Line separator -->
  <line x1="40" y1="212" x2="920" y2="212" stroke="#21262d" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="480" y="228" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Dentro del namespace / (el m&#225;s com&#250;n)</text>

  <!-- Connector from default namespace to rooms -->
  <line x1="180" y1="193" x2="150" y2="245" stroke="#30363d" stroke-width="1.5"/>
  <line x1="240" y1="193" x2="340" y2="245" stroke="#30363d" stroke-width="1.5"/>
  <line x1="300" y1="193" x2="550" y2="245" stroke="#30363d" stroke-width="1.5"/>
  <!-- Personal room connector -->
  <line x1="240" y1="193" x2="750" y2="245" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===================== ROOMS ===================== -->
  <!-- Room general -->
  <rect x="60" y="245" width="200" height="45" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="160" y="265" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Room: general</text>
  <text x="160" y="283" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">socket.join('general')</text>

  <!-- Room dev -->
  <rect x="280" y="245" width="200" height="45" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="380" y="265" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Room: dev</text>
  <text x="380" y="283" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">socket.join('dev')</text>

  <!-- Room sports -->
  <rect x="500" y="245" width="200" height="45" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="600" y="265" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Room: sports</text>
  <text x="600" y="283" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">socket.join('sports')</text>

  <!-- Room personal (user) -->
  <rect x="710" y="245" width="200" height="45" rx="8" fill="#161b22" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="810" y="265" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#a371f7" text-anchor="middle">Room: user:abc123</text>
  <text x="810" y="283" font-family="Inter,Arial,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">socket.join('user:' + userId)</text>

  <!-- Connectors room to sockets -->
  <line x1="120" y1="290" x2="100" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <line x1="175" y1="290" x2="210" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <line x1="340" y1="290" x2="340" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <line x1="420" y1="290" x2="460" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <line x1="570" y1="290" x2="570" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <line x1="810" y1="290" x2="810" y2="340" stroke="#a371f7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===================== SOCKETS ===================== -->
  <!-- Socket 1 (in general) -->
  <rect x="55" y="340" width="90" height="38" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="100" y="356" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">socket Alice</text>
  <text x="100" y="371" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">id: aK9x</text>

  <!-- Socket 2 (in general + dev) -->
  <rect x="165" y="340" width="90" height="38" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="210" y="356" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">socket Bob</text>
  <text x="210" y="371" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">id: bR3y</text>

  <!-- Socket 3 (in dev) -->
  <rect x="295" y="340" width="90" height="38" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="340" y="356" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">socket Carol</text>
  <text x="340" y="371" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">id: cM7z</text>

  <!-- Socket 4 (in dev + sports) -->
  <rect x="415" y="340" width="90" height="38" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="460" y="356" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">socket Dave</text>
  <text x="460" y="371" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">id: dP2w</text>

  <!-- Socket 5 (in sports) -->
  <rect x="525" y="340" width="90" height="38" rx="6" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <text x="570" y="356" font-family="Inter,Arial,sans-serif" font-size="10" fill="#3fb950" text-anchor="middle">socket Eve</text>
  <text x="570" y="371" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">id: eQ5v</text>

  <!-- Socket 6 (personal room) -->
  <rect x="765" y="340" width="90" height="38" rx="6" fill="#21262d" stroke="#a371f7" stroke-width="1.5"/>
  <text x="810" y="356" font-family="Inter,Arial,sans-serif" font-size="10" fill="#a371f7" text-anchor="middle">socket abc123</text>
  <text x="810" y="371" font-family="Inter,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">&#218;nico en room</text>

  <!-- ===================== EMIT EXAMPLES ===================== -->
  <rect x="40" y="400" width="880" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="480" y="420" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="bold" fill="#e6edf3" text-anchor="middle">Patrones de Emit</text>

  <text x="60" y="440" font-family="Inter,Arial,sans-serif" font-size="11" fill="#58a6ff">socket.emit('event', data)</text>
  <text x="300" y="440" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8b949e">Solo al propio socket</text>

  <text x="60" y="458" font-family="Inter,Arial,sans-serif" font-size="11" fill="#3fb950">io.to('general').emit('event', data)</text>
  <text x="300" y="458" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8b949e">A todos en room general (Alice + Bob)</text>

  <text x="60" y="476" font-family="Inter,Arial,sans-serif" font-size="11" fill="#f0883e">socket.broadcast.emit('event', data)</text>
  <text x="300" y="476" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8b949e">A todos los sockets excepto el emisor</text>

  <text x="60" y="494" font-family="Inter,Arial,sans-serif" font-size="11" fill="#a371f7">io.to('user:abc123').emit('notification', d)</text>
  <text x="380" y="494" font-family="Inter,Arial,sans-serif" font-size="11" fill="#8b949e">Solo al usuario abc123 (personal room)</text>
</svg>
