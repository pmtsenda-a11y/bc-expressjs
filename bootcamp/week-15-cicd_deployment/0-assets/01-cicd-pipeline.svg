<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <rect width="960" height="480" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="36" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Pipeline CI/CD — Flujo Completo</text>

  <!-- Stage boxes -->
  <!-- 1. Code Push -->
  <rect x="30" y="80" width="130" height="100" rx="8" fill="#2d2d2d" stroke="#4ade80" stroke-width="2"/>
  <text x="95" y="118" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">1. Code Push</text>
  <text x="95" y="138" fill="#94a3b8" font-size="11" text-anchor="middle">git push origin</text>
  <text x="95" y="154" fill="#94a3b8" font-size="11" text-anchor="middle">main</text>
  <text x="95" y="172" fill="#64748b" font-size="10" text-anchor="middle">GitHub repo</text>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="130" x2="192" y2="130" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 2. CI — Lint & Test -->
  <rect x="194" y="80" width="140" height="100" rx="8" fill="#2d2d2d" stroke="#60a5fa" stroke-width="2"/>
  <text x="264" y="113" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">2. CI Pipeline</text>
  <text x="264" y="131" fill="#94a3b8" font-size="11" text-anchor="middle">pnpm install</text>
  <text x="264" y="147" fill="#94a3b8" font-size="11" text-anchor="middle">pnpm build</text>
  <text x="264" y="163" fill="#94a3b8" font-size="11" text-anchor="middle">pnpm test</text>
  <text x="264" y="175" fill="#64748b" font-size="9" text-anchor="middle">GitHub Actions</text>

  <!-- Arrow 2→3 -->
  <line x1="336" y1="130" x2="366" y2="130" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- 3. Build Image -->
  <rect x="368" y="80" width="140" height="100" rx="8" fill="#2d2d2d" stroke="#f59e0b" stroke-width="2"/>
  <text x="438" y="113" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">3. Docker Build</text>
  <text x="438" y="131" fill="#94a3b8" font-size="11" text-anchor="middle">docker build</text>
  <text x="438" y="147" fill="#94a3b8" font-size="11" text-anchor="middle">multi-stage</text>
  <text x="438" y="163" fill="#94a3b8" font-size="11" text-anchor="middle">~150 MB image</text>
  <text x="438" y="175" fill="#64748b" font-size="9" text-anchor="middle">GitHub Actions</text>

  <!-- Arrow 3→4 -->
  <line x1="510" y1="130" x2="540" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- 4. Deploy -->
  <rect x="542" y="80" width="140" height="100" rx="8" fill="#2d2d2d" stroke="#a78bfa" stroke-width="2"/>
  <text x="612" y="113" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">4. Deploy</text>
  <text x="612" y="131" fill="#94a3b8" font-size="11" text-anchor="middle">Railway / Render</text>
  <text x="612" y="147" fill="#94a3b8" font-size="11" text-anchor="middle">migrate deploy</text>
  <text x="612" y="163" fill="#94a3b8" font-size="11" text-anchor="middle">container up</text>
  <text x="612" y="175" fill="#64748b" font-size="9" text-anchor="middle">auto on main</text>

  <!-- Arrow 4→5 -->
  <line x1="684" y1="130" x2="714" y2="130" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- 5. Health Check -->
  <rect x="716" y="80" width="140" height="100" rx="8" fill="#2d2d2d" stroke="#34d399" stroke-width="2"/>
  <text x="786" y="113" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle">5. Health Check</text>
  <text x="786" y="131" fill="#94a3b8" font-size="11" text-anchor="middle">GET /health</text>
  <text x="786" y="147" fill="#34d399" font-size="11" text-anchor="middle">200 OK ✓</text>
  <text x="786" y="163" fill="#94a3b8" font-size="11" text-anchor="middle">db: connected</text>
  <text x="786" y="175" fill="#64748b" font-size="9" text-anchor="middle">Production URL</text>

  <!-- Failure path -->
  <!-- Failure box under CI -->
  <rect x="194" y="240" width="140" height="60" rx="8" fill="#2d2d2d" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="264" y="265" fill="#f87171" font-size="12" font-weight="700" text-anchor="middle">❌ Tests Fail</text>
  <text x="264" y="283" fill="#94a3b8" font-size="10" text-anchor="middle">No deploy — notify dev</text>

  <!-- Arrow CI→fail (down) -->
  <line x1="264" y1="180" x2="264" y2="238" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="272" y="215" fill="#f87171" font-size="10">fail</text>

  <!-- Arrow CI→build (pass label) -->
  <text x="352" y="122" fill="#60a5fa" font-size="10">pass</text>

  <!-- Rollback box -->
  <rect x="542" y="240" width="140" height="60" rx="8" fill="#2d2d2d" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="612" y="265" fill="#f87171" font-size="12" font-weight="700" text-anchor="middle">⬅ Rollback</text>
  <text x="612" y="283" fill="#94a3b8" font-size="10" text-anchor="middle">Redeploy prev image</text>

  <!-- Arrow deploy→rollback -->
  <line x1="612" y1="180" x2="612" y2="238" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="618" y="215" fill="#f87171" font-size="10">fail</text>

  <!-- Trigger label -->
  <rect x="30" y="330" width="880" height="1" fill="#334155"/>
  <text x="480" y="370" fill="#64748b" font-size="13" text-anchor="middle">Trigger: cada push a main o Pull Request abierto activa el pipeline automáticamente</text>

  <!-- DevOps loop arrow -->
  <path d="M 856 130 Q 920 130 920 400 Q 920 450 480 450 Q 40 450 40 200 Q 40 180 60 175" stroke="#4ade80" stroke-width="1.5" fill="none" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="480" y="420" fill="#4ade80" font-size="11" text-anchor="middle" opacity="0.7">Feedback loop continuo — cada cambio pasa por el pipeline</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>
</svg>
