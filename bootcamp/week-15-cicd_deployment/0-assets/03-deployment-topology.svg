<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <rect width="960" height="500" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="36" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Topología de Despliegue — Railway / Render</text>

  <!-- Developer machine -->
  <rect x="30" y="80" width="150" height="100" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="105" y="110" fill="#4ade80" font-size="13" font-weight="700" text-anchor="middle">💻 Developer</text>
  <text x="105" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">git push origin</text>
  <text x="105" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">main</text>
  <text x="105" y="170" fill="#64748b" font-size="10" text-anchor="middle">local machine</text>

  <!-- Arrow dev → github -->
  <line x1="182" y1="130" x2="228" y2="130" stroke="#4ade80" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- GitHub -->
  <rect x="230" y="80" width="150" height="100" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="305" y="110" fill="#60a5fa" font-size="13" font-weight="700" text-anchor="middle">🐙 GitHub</text>
  <text x="305" y="130" fill="#94a3b8" font-size="11" text-anchor="middle">Repository</text>
  <text x="305" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">Secrets store</text>
  <text x="305" y="170" fill="#64748b" font-size="10" text-anchor="middle">github.com</text>

  <!-- Arrow github → actions -->
  <line x1="382" y1="130" x2="428" y2="130" stroke="#60a5fa" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- GitHub Actions -->
  <rect x="430" y="58" width="160" height="144" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="510" y="82" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">⚡ GitHub Actions</text>
  <text x="510" y="100" fill="#94a3b8" font-size="11" text-anchor="middle">ubuntu-latest runner</text>
  <rect x="446" y="108" width="128" height="18" rx="3" fill="#0f172a"/>
  <text x="510" y="121" fill="#4ade80" font-size="10" text-anchor="middle">pnpm install &amp; build</text>
  <rect x="446" y="130" width="128" height="18" rx="3" fill="#0f172a"/>
  <text x="510" y="143" fill="#4ade80" font-size="10" text-anchor="middle">pnpm test ✓</text>
  <rect x="446" y="152" width="128" height="18" rx="3" fill="#0f172a"/>
  <text x="510" y="165" fill="#4ade80" font-size="10" text-anchor="middle">docker build ✓</text>
  <text x="510" y="192" fill="#64748b" font-size="10" text-anchor="middle">pipeline en verde</text>

  <!-- Arrow actions → railway -->
  <line x1="592" y1="130" x2="638" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-a)"/>

  <!-- Railway/Render platform -->
  <rect x="640" y="58" width="270" height="380" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="775" y="85" fill="#a78bfa" font-size="14" font-weight="700" text-anchor="middle">☁ Railway / Render</text>
  <text x="775" y="105" fill="#64748b" font-size="10" text-anchor="middle">Platform as a Service (PaaS)</text>

  <!-- App service -->
  <rect x="658" y="118" width="234" height="90" rx="6" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="775" y="140" fill="#60a5fa" font-size="12" font-weight="700" text-anchor="middle">🐳 App Service</text>
  <text x="775" y="158" fill="#94a3b8" font-size="10" text-anchor="middle">node:22-alpine container</text>
  <text x="775" y="174" fill="#94a3b8" font-size="10" text-anchor="middle">PORT 3000 (interno)</text>
  <text x="775" y="190" fill="#4ade80" font-size="10" text-anchor="middle">GET /health → 200 OK</text>

  <!-- DB service -->
  <rect x="658" y="224" width="234" height="80" rx="6" fill="#0f172a" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="775" y="248" fill="#7dd3fc" font-size="12" font-weight="700" text-anchor="middle">🗄 PostgreSQL</text>
  <text x="775" y="266" fill="#94a3b8" font-size="10" text-anchor="middle">postgres:16 managed</text>
  <text x="775" y="284" fill="#94a3b8" font-size="10" text-anchor="middle">DATABASE_URL (secret)</text>

  <!-- ENV vars box -->
  <rect x="658" y="320" width="234" height="70" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="775" y="343" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">🔐 Env Variables</text>
  <text x="775" y="361" fill="#94a3b8" font-size="10" text-anchor="middle">DATABASE_URL, JWT_SECRET</text>
  <text x="775" y="377" fill="#94a3b8" font-size="10" text-anchor="middle">NODE_ENV=production</text>

  <!-- App → DB arrow internal -->
  <line x1="775" y1="210" x2="775" y2="222" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#arr-lb)"/>

  <!-- Public URL -->
  <rect x="640" y="456" width="270" height="36" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="775" y="479" fill="#34d399" font-size="11" text-anchor="middle">https://mi-api.railway.app</text>

  <!-- Arrow platform → url -->
  <line x1="775" y1="440" x2="775" y2="454" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Internet user -->
  <rect x="30" y="280" width="150" height="60" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="105" y="305" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">🌐 Client</text>
  <text x="105" y="323" fill="#94a3b8" font-size="10" text-anchor="middle">HTTPS request</text>

  <!-- Client → railway -->
  <path d="M 182 310 Q 400 310 638 310" stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-teal)"/>

  <!-- Markers -->
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
    <marker id="arr-a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-lb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7dd3fc"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
  </defs>
</svg>
