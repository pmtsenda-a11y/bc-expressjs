<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, system-ui, sans-serif">
  <rect width="960" height="500" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="36" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">GitHub Actions — Anatomía de un Workflow</text>

  <!-- YAML source panel (left) -->
  <rect x="30" y="60" width="420" height="400" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="240" y="85" fill="#94a3b8" font-size="12" font-weight="600" text-anchor="middle">.github/workflows/ci.yml</text>

  <!-- YAML content -->
  <text x="50" y="110" fill="#60a5fa" font-size="11" font-family="monospace">name: CI</text>
  <text x="50" y="128" fill="#60a5fa" font-size="11" font-family="monospace">on:</text>
  <text x="66" y="144" fill="#a78bfa" font-size="11" font-family="monospace">push:</text>
  <text x="82" y="160" fill="#94a3b8" font-size="11" font-family="monospace">branches: [main]</text>
  <text x="66" y="176" fill="#a78bfa" font-size="11" font-family="monospace">pull_request:</text>
  <text x="82" y="192" fill="#94a3b8" font-size="11" font-family="monospace">branches: [main]</text>

  <text x="50" y="216" fill="#60a5fa" font-size="11" font-family="monospace">jobs:</text>
  <text x="66" y="232" fill="#f59e0b" font-size="11" font-family="monospace">test:</text>
  <text x="82" y="248" fill="#7dd3fc" font-size="11" font-family="monospace">runs-on: ubuntu-latest</text>
  <text x="82" y="264" fill="#60a5fa" font-size="11" font-family="monospace">steps:</text>

  <text x="98" y="282" fill="#4ade80" font-size="11" font-family="monospace">- uses: actions/checkout@v4</text>
  <text x="98" y="298" fill="#4ade80" font-size="11" font-family="monospace">- uses: pnpm/action-setup@v4</text>
  <text x="114" y="314" fill="#94a3b8" font-size="11" font-family="monospace">with:</text>
  <text x="130" y="330" fill="#94a3b8" font-size="11" font-family="monospace">version: 10</text>
  <text x="98" y="348" fill="#4ade80" font-size="11" font-family="monospace">- uses: actions/setup-node@v4</text>
  <text x="114" y="364" fill="#94a3b8" font-size="11" font-family="monospace">with:</text>
  <text x="130" y="380" fill="#94a3b8" font-size="11" font-family="monospace">node-version: '22'</text>
  <text x="130" y="396" fill="#94a3b8" font-size="11" font-family="monospace">cache: pnpm</text>
  <text x="98" y="414" fill="#4ade80" font-size="11" font-family="monospace">- run: pnpm install --frozen-lockfile</text>
  <text x="98" y="430" fill="#4ade80" font-size="11" font-family="monospace">- run: pnpm build</text>
  <text x="98" y="446" fill="#4ade80" font-size="11" font-family="monospace">- run: pnpm test</text>

  <!-- Right panel: concept annotations -->
  <rect x="510" y="60" width="420" height="400" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="720" y="85" fill="#94a3b8" font-size="12" font-weight="600" text-anchor="middle">Conceptos Clave</text>

  <!-- Concept rows -->
  <!-- Trigger -->
  <rect x="530" y="100" width="380" height="52" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="548" y="121" fill="#4ade80" font-size="12" font-weight="700">Trigger (on:)</text>
  <text x="548" y="140" fill="#94a3b8" font-size="11">Evento que activa el workflow. push a main o PR abierta.</text>

  <!-- Job -->
  <rect x="530" y="164" width="380" height="52" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="548" y="185" fill="#f59e0b" font-size="12" font-weight="700">Job</text>
  <text x="548" y="204" fill="#94a3b8" font-size="11">Conjunto de steps que corren en un runner aislado.</text>

  <!-- Runner -->
  <rect x="530" y="228" width="380" height="52" rx="6" fill="#1e293b" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="548" y="249" fill="#7dd3fc" font-size="12" font-weight="700">Runner (ubuntu-latest)</text>
  <text x="548" y="268" fill="#94a3b8" font-size="11">Máquina virtual donde corren los steps. GitHub la provee.</text>

  <!-- Steps -->
  <rect x="530" y="292" width="380" height="52" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="548" y="313" fill="#a78bfa" font-size="12" font-weight="700">Step (uses / run)</text>
  <text x="548" y="332" fill="#94a3b8" font-size="11">Acción reutilizable (uses) o comando shell (run).</text>

  <!-- Cache -->
  <rect x="530" y="356" width="380" height="52" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="548" y="377" fill="#34d399" font-size="12" font-weight="700">Cache (cache: pnpm)</text>
  <text x="548" y="396" fill="#94a3b8" font-size="11">Reutiliza node_modules entre runs. Reduce tiempo de CI ~70%.</text>

  <!-- Secret -->
  <rect x="530" y="420" width="380" height="34" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5"/>
  <text x="548" y="441" fill="#f87171" font-size="12" font-weight="700">Secret: ${{ secrets.JWT_SECRET }}</text>

  <!-- Connector lines -->
  <line x1="452" y1="120" x2="528" y2="126" stroke="#4ade80" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="452" y1="232" x2="528" y2="190" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="452" y1="248" x2="528" y2="254" stroke="#7dd3fc" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="452" y1="380" x2="528" y2="382" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
</svg>
