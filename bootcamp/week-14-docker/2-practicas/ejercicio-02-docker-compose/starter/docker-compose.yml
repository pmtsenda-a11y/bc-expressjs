# ============================================================
# PASO 3: Volumes para persistencia
# ============================================================
# Agrega el volume pg_data al servicio postgres y decláralo
# en la sección volumes: al final del archivo.
#
# En postgres, agrega bajo el servicio:
#     volumes:
#       - pg_data:/var/lib/postgresql/data
#
# Y al final del archivo:
# volumes:
#   pg_data:
