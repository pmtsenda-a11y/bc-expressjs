<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="500" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Topología docker-compose</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#888888">API + PostgreSQL + Redis orquestados en una red interna</text>

  <!-- Host system box -->
  <rect x="20" y="68" width="920" height="400" rx="10" fill="#1e1e1e" stroke="#444444" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="60" y="90" font-size="12" fill="#666666">Host — docker-compose up</text>

  <!-- Internal network background -->
  <rect x="240" y="100" width="700" height="340" rx="8" fill="#1a2a1a" stroke="#68A063" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="590" y="118" text-anchor="middle" font-size="11" fill="#68A063">Red interna: app_network</text>

  <!-- ── SERVICE: app ── -->
  <rect x="50" y="105" width="175" height="180" rx="8" fill="#222222" stroke="#2496ED" stroke-width="2"/>
  <rect x="50" y="105" width="175" height="32" rx="8" fill="#1d3a4f"/>
  <rect x="50" y="121" width="175" height="16" fill="#1d3a4f"/>
  <text x="137" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">app</text>
  <text x="137" y="152" text-anchor="middle" font-size="11" fill="#888888">build: . (Dockerfile)</text>
  <text x="137" y="170" text-anchor="middle" font-size="11" fill="#cccccc">PORT: 3000</text>
  <text x="137" y="186" text-anchor="middle" font-size="11" fill="#cccccc">NODE_ENV: production</text>
  <text x="137" y="202" text-anchor="middle" font-size="11" fill="#cccccc">DATABASE_URL</text>
  <text x="137" y="218" text-anchor="middle" font-size="10" fill="#666666">env_file: .env</text>
  <text x="137" y="237" text-anchor="middle" font-size="10" fill="#68A063">depends_on: postgres</text>
  <text x="137" y="253" text-anchor="middle" font-size="10" fill="#68A063">condition: service_healthy</text>
  <text x="137" y="272" text-anchor="middle" font-size="10" fill="#888888">networks: [app_network]</text>

  <!-- Port arrow: host → app -->
  <line x1="50" y1="188" x2="20" y2="188" stroke="#2496ED" stroke-width="2"/>
  <polygon points="20,183 6,188 20,193" fill="#2496ED"/>
  <text x="28" y="182" text-anchor="middle" font-size="10" fill="#7ec8e3">3000</text>
  <text x="28" y="196" text-anchor="middle" font-size="10" fill="#888888">host</text>

  <!-- ── SERVICE: postgres ── -->
  <rect x="370" y="130" width="185" height="200" rx="8" fill="#222222" stroke="#336699" stroke-width="2"/>
  <rect x="370" y="130" width="185" height="32" rx="8" fill="#1a2a3a"/>
  <rect x="370" y="146" width="185" height="16" fill="#1a2a3a"/>
  <text x="462" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#8ab4d4">postgres</text>
  <text x="462" y="178" text-anchor="middle" font-size="11" fill="#888888">image: postgres:16-alpine</text>
  <text x="462" y="196" text-anchor="middle" font-size="11" fill="#cccccc">POSTGRES_DB: mydb</text>
  <text x="462" y="212" text-anchor="middle" font-size="11" fill="#cccccc">POSTGRES_USER: user</text>
  <text x="462" y="228" text-anchor="middle" font-size="11" fill="#cccccc">POSTGRES_PASSWORD: ***</text>
  <text x="462" y="252" text-anchor="middle" font-size="10" fill="#68A063">healthcheck:</text>
  <text x="462" y="268" text-anchor="middle" font-size="10" fill="#68A063">pg_isready -U user</text>
  <text x="462" y="290" text-anchor="middle" font-size="10" fill="#888888">networks: [app_network]</text>
  <text x="462" y="306" text-anchor="middle" font-size="10" fill="#cc8844">volumes: [pg_data:/var/lib/...]</text>
  <!-- NO port exposure label -->
  <text x="462" y="322" text-anchor="middle" font-size="10" fill="#cc4444">sin puertos expuestos al host</text>

  <!-- ── SERVICE: redis ── -->
  <rect x="710" y="130" width="185" height="185" rx="8" fill="#222222" stroke="#cc4444" stroke-width="2"/>
  <rect x="710" y="130" width="185" height="32" rx="8" fill="#3a1a1a"/>
  <rect x="710" y="146" width="185" height="16" fill="#3a1a1a"/>
  <text x="802" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#ee9999">redis</text>
  <text x="802" y="178" text-anchor="middle" font-size="11" fill="#888888">image: redis:7-alpine</text>
  <text x="802" y="196" text-anchor="middle" font-size="11" fill="#cccccc">command: redis-server</text>
  <text x="802" y="212" text-anchor="middle" font-size="11" fill="#cccccc">--requirepass ***</text>
  <text x="802" y="236" text-anchor="middle" font-size="10" fill="#68A063">healthcheck:</text>
  <text x="802" y="252" text-anchor="middle" font-size="10" fill="#68A063">redis-cli ping</text>
  <text x="802" y="272" text-anchor="middle" font-size="10" fill="#888888">networks: [app_network]</text>
  <text x="802" y="290" text-anchor="middle" font-size="10" fill="#cc8844">volumes: [redis_data:/data]</text>
  <text x="802" y="308" text-anchor="middle" font-size="10" fill="#cc4444">sin puertos expuestos al host</text>

  <!-- Connections: app → postgres -->
  <line x1="225" y1="195" x2="370" y2="232" stroke="#336699" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="370,226 384,232 370,238" fill="#336699"/>
  <text x="295" y="205" text-anchor="middle" font-size="10" fill="#8ab4d4">TCP:5432</text>

  <!-- Connections: app → redis -->
  <line x1="225" y1="210" x2="710" y2="215" stroke="#cc4444" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="710,209 724,215 710,221" fill="#cc4444"/>
  <text x="460" y="200" text-anchor="middle" font-size="10" fill="#ee9999">TCP:6379</text>

  <!-- Named volumes section at bottom -->
  <text x="480" y="368" text-anchor="middle" font-size="12" font-weight="600" fill="#888888">Volúmenes nombrados (persisten entre reinicios)</text>

  <rect x="260" y="378" width="190" height="38" rx="6" fill="#2a2a1a" stroke="#cc8844" stroke-width="1.5"/>
  <text x="355" y="395" text-anchor="middle" font-size="12" fill="#cc8844">pg_data</text>
  <text x="355" y="410" text-anchor="middle" font-size="10" fill="#888888">/var/lib/postgresql/data</text>

  <rect x="510" y="378" width="190" height="38" rx="6" fill="#2a2a1a" stroke="#cc8844" stroke-width="1.5"/>
  <text x="605" y="395" text-anchor="middle" font-size="12" fill="#cc8844">redis_data</text>
  <text x="605" y="410" text-anchor="middle" font-size="10" fill="#888888">/data</text>

  <!-- Volume arrows -->
  <line x1="462" y1="332" x2="355" y2="378" stroke="#cc8844" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="802" y1="315" x2="605" y2="378" stroke="#cc8844" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <text x="480" y="465" text-anchor="middle" font-size="11" fill="#666666">Los servicios postgres y redis NO exponen puertos al host — solo accesibles dentro de app_network</text>
  <text x="480" y="482" text-anchor="middle" font-size="11" fill="#666666">docker compose up --build  |  docker compose down -v  (para borrar volúmenes)</text>
</svg>
