<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="500" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Multi-Stage Build</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#888888">Stage 1 compila TypeScript — Stage 2 crea la imagen mínima de producción</text>

  <!-- ── STAGE 1: builder ── -->
  <rect x="30" y="72" width="410" height="360" rx="8" fill="#222222" stroke="#2496ED" stroke-width="2"/>
  <rect x="30" y="72" width="410" height="36" rx="8" fill="#1d3a4f"/>
  <rect x="30" y="96" width="410" height="12" fill="#1d3a4f"/>
  <text x="235" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Stage 1 — builder</text>

  <!-- stage 1 content -->
  <rect x="50" y="120" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="62" y="139" font-size="12" fill="#2496ED" font-family="monospace">FROM</text>
  <text x="98" y="139" font-size="12" fill="#cccccc" font-family="monospace"> node:22-alpine AS builder</text>

  <rect x="50" y="156" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="62" y="175" font-size="12" fill="#2496ED" font-family="monospace">COPY</text>
  <text x="97" y="175" font-size="12" fill="#cccccc" font-family="monospace"> package.json pnpm-lock.yaml ./</text>

  <rect x="50" y="192" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="62" y="211" font-size="12" fill="#2496ED" font-family="monospace">RUN</text>
  <text x="92" y="211" font-size="12" fill="#cccccc" font-family="monospace"> corepack enable &amp;&amp; pnpm install</text>

  <rect x="50" y="228" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="62" y="247" font-size="12" fill="#2496ED" font-family="monospace">COPY</text>
  <text x="97" y="247" font-size="12" fill="#cccccc" font-family="monospace"> . .</text>

  <rect x="50" y="264" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="62" y="283" font-size="12" fill="#2496ED" font-family="monospace">RUN</text>
  <text x="92" y="283" font-size="12" fill="#cccccc" font-family="monospace"> pnpm build   → genera dist/</text>

  <!-- What's in builder (labels) -->
  <text x="235" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#888888">Contiene (NO va a producción):</text>

  <rect x="50" y="338" width="170" height="24" rx="4" fill="#3a1a1a" stroke="#cc4444" stroke-width="1"/>
  <text x="135" y="354" text-anchor="middle" font-size="11" fill="#ee9999">node_modules completo (~120 MB)</text>

  <rect x="230" y="338" width="170" height="24" rx="4" fill="#3a2a1a" stroke="#cc8844" stroke-width="1"/>
  <text x="315" y="354" text-anchor="middle" font-size="11" fill="#ddbb99">src/ (TypeScript fuente)</text>

  <rect x="50" y="370" width="170" height="24" rx="4" fill="#2a1a1a" stroke="#cc4444" stroke-width="1"/>
  <text x="135" y="386" text-anchor="middle" font-size="11" fill="#ee9999">devDependencies (~40 MB)</text>

  <rect x="230" y="370" width="170" height="24" rx="4" fill="#1a3a1a" stroke="#68A063" stroke-width="1"/>
  <text x="315" y="386" text-anchor="middle" font-size="11" fill="#9dccb0">✓ dist/ (JavaScript compilado)</text>

  <!-- Size label -->
  <text x="235" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">~800 MB total</text>

  <!-- Arrow between stages -->
  <line x1="440" y1="250" x2="500" y2="250" stroke="#68A063" stroke-width="3"/>
  <polygon points="500,243 516,250 500,257" fill="#68A063"/>
  <text x="478" y="238" text-anchor="middle" font-size="11" fill="#68A063">COPY</text>
  <text x="478" y="251" text-anchor="middle" font-size="10" fill="#68A063">--from=builder</text>
  <text x="478" y="263" text-anchor="middle" font-size="10" fill="#68A063">dist/</text>

  <!-- ── STAGE 2: production ── -->
  <rect x="520" y="72" width="410" height="360" rx="8" fill="#222222" stroke="#68A063" stroke-width="2"/>
  <rect x="520" y="72" width="410" height="36" rx="8" fill="#1a3a1a"/>
  <rect x="520" y="96" width="410" height="12" fill="#1a3a1a"/>
  <text x="725" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#9dccb0">Stage 2 — production</text>

  <!-- stage 2 content -->
  <rect x="540" y="120" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="552" y="139" font-size="12" fill="#68A063" font-family="monospace">FROM</text>
  <text x="589" y="139" font-size="12" fill="#cccccc" font-family="monospace"> node:22-alpine</text>
  <text x="745" y="139" font-size="11" fill="#666666" font-family="monospace"> ← imagen fresca</text>

  <rect x="540" y="156" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="552" y="175" font-size="12" fill="#68A063" font-family="monospace">COPY</text>
  <text x="588" y="175" font-size="12" fill="#cccccc" font-family="monospace"> --from=builder /app/dist ./dist</text>

  <rect x="540" y="192" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="552" y="211" font-size="12" fill="#68A063" font-family="monospace">COPY</text>
  <text x="588" y="211" font-size="12" fill="#cccccc" font-family="monospace"> --from=builder /app/package.json .</text>

  <rect x="540" y="228" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="552" y="247" font-size="12" fill="#68A063" font-family="monospace">RUN</text>
  <text x="581" y="247" font-size="12" fill="#cccccc" font-family="monospace"> pnpm install --prod</text>
  <text x="730" y="247" font-size="11" fill="#666666" font-family="monospace"> ← solo deps prod</text>

  <rect x="540" y="264" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="552" y="283" font-size="12" fill="#68A063" font-family="monospace">USER</text>
  <text x="588" y="283" font-size="12" fill="#cccccc" font-family="monospace"> node</text>
  <text x="634" y="283" font-size="11" fill="#666666" font-family="monospace"> ← usuario no-root</text>

  <rect x="540" y="300" width="370" height="28" rx="4" fill="#1a1a1a"/>
  <text x="552" y="319" font-size="12" fill="#68A063" font-family="monospace">CMD</text>
  <text x="581" y="319" font-size="12" fill="#cccccc" font-family="monospace"> ["node", "dist/server.js"]</text>

  <!-- What's in production -->
  <text x="725" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#888888">Solo lo necesario en producción:</text>

  <rect x="540" y="360" width="170" height="24" rx="4" fill="#1a3a1a" stroke="#68A063" stroke-width="1"/>
  <text x="625" y="376" text-anchor="middle" font-size="11" fill="#9dccb0">✓ dist/ (JS compilado)</text>

  <rect x="720" y="360" width="170" height="24" rx="4" fill="#1a3a1a" stroke="#68A063" stroke-width="1"/>
  <text x="805" y="376" text-anchor="middle" font-size="11" fill="#9dccb0">✓ deps de producción</text>

  <!-- Size label -->
  <text x="725" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#68A063">~150 MB total  (-81%)</text>

  <!-- Bottom labels -->
  <text x="480" y="468" text-anchor="middle" font-size="12" fill="#888888">El Stage 1 (builder) se descarta al final del build — solo Stage 2 se convierte en imagen</text>
  <text x="480" y="486" text-anchor="middle" font-size="12" fill="#666666">Beneficios: imagen más pequeña, sin código fuente TS, sin devDependencies, usuario no-root</text>
</svg>
