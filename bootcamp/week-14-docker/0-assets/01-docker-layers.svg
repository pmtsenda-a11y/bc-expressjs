<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="540" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">Capas de una Imagen Docker</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#888888">Cada instrucción del Dockerfile crea una capa inmutable de solo lectura</text>

  <!-- LEFT PANEL: Dockerfile -->
  <rect x="30" y="75" width="400" height="420" rx="8" fill="#222222" stroke="#444444" stroke-width="1"/>
  <text x="230" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#888888">Dockerfile</text>

  <!-- Dockerfile lines -->
  <rect x="50" y="112" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="132" font-size="13" fill="#2496ED" font-family="monospace">FROM</text>
  <text x="104" y="132" font-size="13" fill="#cccccc" font-family="monospace"> node:22-alpine</text>

  <rect x="50" y="152" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="172" font-size="13" fill="#2496ED" font-family="monospace">WORKDIR</text>
  <text x="122" y="172" font-size="13" fill="#cccccc" font-family="monospace"> /app</text>

  <rect x="50" y="192" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="212" font-size="13" fill="#2496ED" font-family="monospace">COPY</text>
  <text x="100" y="212" font-size="13" fill="#cccccc" font-family="monospace"> package.json ./</text>

  <rect x="50" y="232" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="252" font-size="13" fill="#2496ED" font-family="monospace">RUN</text>
  <text x="96" y="252" font-size="13" fill="#cccccc" font-family="monospace"> pnpm install</text>

  <rect x="50" y="272" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="292" font-size="13" fill="#2496ED" font-family="monospace">COPY</text>
  <text x="100" y="292" font-size="13" fill="#cccccc" font-family="monospace"> . .</text>

  <rect x="50" y="312" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="332" font-size="13" fill="#2496ED" font-family="monospace">RUN</text>
  <text x="96" y="332" font-size="13" fill="#cccccc" font-family="monospace"> pnpm build</text>

  <rect x="50" y="352" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="372" font-size="13" fill="#2496ED" font-family="monospace">EXPOSE</text>
  <text x="116" y="372" font-size="13" fill="#cccccc" font-family="monospace"> 3000</text>

  <rect x="50" y="392" width="360" height="32" rx="4" fill="#2a2a2a"/>
  <text x="62" y="412" font-size="13" fill="#2496ED" font-family="monospace">CMD</text>
  <text x="95" y="412" font-size="13" fill="#cccccc" font-family="monospace"> ["node", "dist/server.js"]</text>

  <!-- Note -->
  <text x="230" y="460" text-anchor="middle" font-size="11" fill="#666666">Cada instrucción añade 1 capa a la imagen</text>
  <text x="230" y="476" text-anchor="middle" font-size="11" fill="#666666">Las capas se cachean para builds más rápidos</text>

  <!-- Arrows from left to right -->
  <line x1="430" y1="128" x2="500" y2="128" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="168" x2="500" y2="168" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="208" x2="500" y2="208" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="248" x2="500" y2="248" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="288" x2="500" y2="288" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="328" x2="500" y2="328" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="368" x2="500" y2="368" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="408" x2="500" y2="408" stroke="#444444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- RIGHT PANEL: Image layers (stacked) -->
  <text x="730" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#888888">Imagen (capas apiladas)</text>

  <!-- Layer stack — bottom to top -->
  <!-- Layer 1: base -->
  <rect x="510" y="390" width="440" height="44" rx="4" fill="#1d3a4f" stroke="#2496ED" stroke-width="1.5"/>
  <text x="730" y="417" text-anchor="middle" font-size="12" fill="#7ec8e3">Capa base — node:22-alpine (~60 MB)</text>

  <!-- Layer 2: WORKDIR -->
  <rect x="510" y="344" width="440" height="42" rx="4" fill="#1a3a2a" stroke="#68A063" stroke-width="1.5"/>
  <text x="730" y="369" text-anchor="middle" font-size="12" fill="#9dccb0">WORKDIR /app  (~0 MB)</text>

  <!-- Layer 3: COPY package.json -->
  <rect x="510" y="298" width="440" height="42" rx="4" fill="#2a2a1a" stroke="#cccc44" stroke-width="1.5"/>
  <text x="730" y="323" text-anchor="middle" font-size="12" fill="#ddddaa">COPY package.json  (~1 KB)</text>

  <!-- Layer 4: RUN pnpm install -->
  <rect x="510" y="252" width="440" height="42" rx="4" fill="#3a2a1a" stroke="#cc8844" stroke-width="1.5"/>
  <text x="730" y="277" text-anchor="middle" font-size="12" fill="#ddbb99">RUN pnpm install  (~120 MB) ← más pesada</text>

  <!-- Layer 5: COPY . . -->
  <rect x="510" y="206" width="440" height="42" rx="4" fill="#2a1a3a" stroke="#9944cc" stroke-width="1.5"/>
  <text x="730" y="231" text-anchor="middle" font-size="12" fill="#cc99dd">COPY src/  (~2 MB)</text>

  <!-- Layer 6: RUN pnpm build -->
  <rect x="510" y="160" width="440" height="42" rx="4" fill="#1a2a3a" stroke="#4488cc" stroke-width="1.5"/>
  <text x="730" y="185" text-anchor="middle" font-size="12" fill="#99bbdd">RUN pnpm build → dist/  (~1 MB)</text>

  <!-- Layer 7: EXPOSE + CMD (metadata) -->
  <rect x="510" y="110" width="440" height="46" rx="4" fill="#2a2a2a" stroke="#555555" stroke-width="1.5"/>
  <text x="730" y="130" text-anchor="middle" font-size="12" fill="#aaaaaa">EXPOSE 3000 + CMD  (metadata, 0 MB)</text>
  <text x="730" y="148" text-anchor="middle" font-size="10" fill="#666666">No genera capa de filesystem</text>

  <!-- Container layer (read-write) -->
  <rect x="510" y="446" width="440" height="40" rx="4" fill="#2a1a1a" stroke="#cc4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="730" y="471" text-anchor="middle" font-size="12" fill="#ee9999">▶ Contenedor — capa de escritura (efímera)</text>

  <!-- Bottom note -->
  <text x="730" y="505" text-anchor="middle" font-size="11" fill="#666666">Las capas de imagen son inmutables (read-only)</text>
  <text x="730" y="520" text-anchor="middle" font-size="11" fill="#666666">El contenedor añade una capa de escritura temporal encima</text>
</svg>
