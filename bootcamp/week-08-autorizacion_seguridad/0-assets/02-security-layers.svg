<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" width="920" height="540">
  <defs>
    <marker id="arrow-w" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="540" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="460" y="38" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">Capas de Seguridad en una API Express</text>
  <text x="460" y="58" font-family="Inter, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Cada capa filtra amenazas antes de llegar al controlador</text>

  <!-- ─── VERTICAL LAYER STACK ─── -->
  <!-- Layer 1: Network / HTTPS / CORS -->
  <rect x="60" y="80" width="800" height="64" rx="8" fill="#0d2137" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="100" y="106" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#58a6ff">Capa 1 — Transporte</text>
  <text x="100" y="124" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">HTTPS · CORS (whitelist de orígenes) · TLS</text>
  <text x="770" y="106" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">cors()</text>
  <text x="770" y="124" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">Bloquea orígenes no autorizados</text>

  <!-- Arrow down -->
  <line x1="460" y1="144" x2="460" y2="160" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-w)"/>

  <!-- Layer 2: Rate Limiting -->
  <rect x="60" y="160" width="800" height="64" rx="8" fill="#1a1a0d" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="100" y="186" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#fbbf24">Capa 2 — Rate Limiting</text>
  <text x="100" y="204" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">Límite global: 100 req/15min · Límite auth: 5 req/15min</text>
  <text x="770" y="186" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">express-rate-limit</text>
  <text x="770" y="204" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">429 Too Many Requests</text>

  <!-- Arrow down -->
  <line x1="460" y1="224" x2="460" y2="240" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-w)"/>

  <!-- Layer 3: Security Headers -->
  <rect x="60" y="240" width="800" height="64" rx="8" fill="#0d2e10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="100" y="266" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#4ade80">Capa 3 — Cabeceras de Seguridad</text>
  <text x="100" y="284" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">Helmet: CSP · HSTS · X-Frame-Options · X-Content-Type-Options · Referrer-Policy</text>
  <text x="770" y="266" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">helmet()</text>
  <text x="770" y="284" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">Previene XSS, clickjacking, MITM</text>

  <!-- Arrow down -->
  <line x1="460" y1="304" x2="460" y2="320" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-w)"/>

  <!-- Layer 4: Input Sanitization -->
  <rect x="60" y="320" width="800" height="64" rx="8" fill="#2d1117" stroke="#f87171" stroke-width="1.5"/>
  <text x="100" y="346" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#f87171">Capa 4 — Sanitización de Inputs</text>
  <text x="100" y="364" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">express-mongo-sanitize: elimina operadores $gt, $ne, $where · Zod: tipos estrictos</text>
  <text x="770" y="346" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">mongoSanitize()</text>
  <text x="770" y="364" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">Previene NoSQL injection</text>

  <!-- Arrow down -->
  <line x1="460" y1="384" x2="460" y2="400" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-w)"/>

  <!-- Layer 5: Authentication -->
  <rect x="60" y="400" width="800" height="64" rx="8" fill="#0d1f3c" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="100" y="426" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#79c0ff">Capa 5 — Autenticación</text>
  <text x="100" y="444" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">JWT en cookie HttpOnly · verifyAccessToken() · req.user = decoded</text>
  <text x="770" y="426" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">authMiddleware</text>
  <text x="770" y="444" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">401 si token inválido</text>

  <!-- Arrow down -->
  <line x1="460" y1="464" x2="460" y2="480" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow-w)"/>

  <!-- Layer 6: Authorization (RBAC) -->
  <rect x="60" y="480" width="800" height="46" rx="8" fill="#1a0d2e" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="100" y="500" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#d2a8ff">Capa 6 — Autorización (RBAC)</text>
  <text x="100" y="517" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">requireRole('admin') — verifica req.user.role</text>
  <text x="770" y="500" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">requireRole()</text>
  <text x="770" y="517" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="end">403 si rol insuficiente</text>
</svg>
