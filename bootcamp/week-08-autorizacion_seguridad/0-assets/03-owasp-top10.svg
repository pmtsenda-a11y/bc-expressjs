<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560">
  <!-- Background -->
  <rect width="920" height="560" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="460" y="36" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">OWASP Top 10 (2021) — Relevancia para APIs REST</text>
  <text x="460" y="55" font-family="Inter, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">Vulnerabilidades más críticas y mitigación en el stack Node.js / Express</text>

  <!-- Column headers -->
  <rect x="30" y="68" width="860" height="30" rx="4" fill="#1c2128"/>
  <text x="60" y="88" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">#</text>
  <text x="190" y="88" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">Vulnerabilidad</text>
  <text x="480" y="88" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">Mitigación</text>
  <text x="750" y="88" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e">Semana</text>

  <!-- Row data: id, name, color, mitigation, week, severity-color -->
  <!-- A01 Broken Access Control -->
  <rect x="30" y="98" width="860" height="42" rx="0" fill="#161b22"/>
  <rect x="30" y="98" width="5" height="42" fill="#f87171"/>
  <text x="60" y="115" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f87171">A01</text>
  <text x="60" y="131" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Crítico</text>
  <text x="130" y="115" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Broken Access Control</text>
  <text x="130" y="131" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Acceso a recursos sin autorización adecuada</text>
  <text x="480" y="120" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">requireRole() · authMiddleware en todas las rutas privadas</text>
  <text x="750" y="120" font-family="Inter, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">08</text>

  <!-- A02 Cryptographic Failures -->
  <rect x="30" y="140" width="860" height="42" rx="0" fill="#0d1117"/>
  <rect x="30" y="140" width="5" height="42" fill="#f87171"/>
  <text x="60" y="157" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#f87171">A02</text>
  <text x="60" y="173" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Crítico</text>
  <text x="130" y="157" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Cryptographic Failures</text>
  <text x="130" y="173" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Datos sensibles sin cifrado, secretos expuestos</text>
  <text x="480" y="162" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">bcrypt para passwords · JWT secrets en .env · HTTPS</text>
  <text x="750" y="162" font-family="Inter, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">07</text>

  <!-- A03 Injection -->
  <rect x="30" y="182" width="860" height="42" rx="0" fill="#161b22"/>
  <rect x="30" y="182" width="5" height="42" fill="#fbbf24"/>
  <text x="60" y="199" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">A03</text>
  <text x="60" y="215" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Alto</text>
  <text x="130" y="199" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Injection</text>
  <text x="130" y="215" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">SQL, NoSQL, OS injection desde inputs no validados</text>
  <text x="480" y="204" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">mongoSanitize() · Zod schema validation · Prisma parameterized queries</text>
  <text x="750" y="204" font-family="Inter, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">08</text>

  <!-- A05 Security Misconfiguration -->
  <rect x="30" y="224" width="860" height="42" rx="0" fill="#0d1117"/>
  <rect x="30" y="224" width="5" height="42" fill="#fbbf24"/>
  <text x="60" y="241" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">A05</text>
  <text x="60" y="257" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Alto</text>
  <text x="130" y="241" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Security Misconfiguration</text>
  <text x="130" y="257" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Headers inseguros, stack traces expuestos, CORS permisivo</text>
  <text x="480" y="246" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">helmet() · CORS whitelist · errorHandler sin stack traces</text>
  <text x="750" y="246" font-family="Inter, sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">08</text>

  <!-- A06 Vulnerable Components -->
  <rect x="30" y="266" width="860" height="42" rx="0" fill="#161b22"/>
  <rect x="30" y="266" width="5" height="42" fill="#6b7280"/>
  <text x="60" y="283" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#8b949e">A06</text>
  <text x="60" y="299" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Medio</text>
  <text x="130" y="283" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Vulnerable &amp; Outdated Components</text>
  <text x="130" y="299" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Dependencias con CVEs conocidos, versiones flotantes</text>
  <text x="480" y="288" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">Versiones exactas en package.json · pnpm audit · Dependabot</text>
  <text x="750" y="288" font-family="Inter, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">todos</text>

  <!-- A07 Auth Failures -->
  <rect x="30" y="308" width="860" height="42" rx="0" fill="#0d1117"/>
  <rect x="30" y="308" width="5" height="42" fill="#fbbf24"/>
  <text x="60" y="325" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">A07</text>
  <text x="60" y="341" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Alto</text>
  <text x="130" y="325" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Identification &amp; Auth Failures</text>
  <text x="130" y="341" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Fuerza bruta, tokens sin expiración, user enumeration</text>
  <text x="480" y="330" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">rate-limit en /auth · JWT con exp · mismo error para email/password</text>
  <text x="750" y="330" font-family="Inter, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">07-08</text>

  <!-- A09 Logging failures -->
  <rect x="30" y="350" width="860" height="42" rx="0" fill="#161b22"/>
  <rect x="30" y="350" width="5" height="42" fill="#6b7280"/>
  <text x="60" y="367" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#8b949e">A09</text>
  <text x="60" y="383" font-family="Inter, sans-serif" font-size="10" fill="#6b7280">Nivel: Medio</text>
  <text x="130" y="367" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Logging &amp; Monitoring Failures</text>
  <text x="130" y="383" font-family="Inter, sans-serif" font-size="10" fill="#8b949e">Sin logs de acceso, errores silenciosos, sin alertas</text>
  <text x="480" y="372" font-family="Inter, sans-serif" font-size="11" fill="#4ade80">Winston logging · morgan HTTP logger · structured logs</text>
  <text x="750" y="372" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">04</text>

  <!-- Legend / note -->
  <rect x="30" y="410" width="860" height="120" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="432" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#e6edf3" text-anchor="middle">Principio de Defensa en Profundidad</text>
  <text x="460" y="452" font-family="Inter, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Ninguna capa de seguridad es suficiente por sí sola. La seguridad real requiere múltiples capas combinadas.</text>

  <!-- Defense layers mini chips -->
  <rect x="60" y="466" width="110" height="26" rx="13" fill="#0d2137" stroke="#58a6ff" stroke-width="1"/>
  <text x="115" y="484" font-family="Inter, sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle">CORS whitelist</text>

  <rect x="185" y="466" width="110" height="26" rx="13" fill="#1a1a0d" stroke="#fbbf24" stroke-width="1"/>
  <text x="240" y="484" font-family="Inter, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Rate Limiting</text>

  <rect x="310" y="466" width="90" height="26" rx="13" fill="#0d2e10" stroke="#4ade80" stroke-width="1"/>
  <text x="355" y="484" font-family="Inter, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">Helmet</text>

  <rect x="415" y="466" width="130" height="26" rx="13" fill="#2d1117" stroke="#f87171" stroke-width="1"/>
  <text x="480" y="484" font-family="Inter, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">Input Sanitization</text>

  <rect x="560" y="466" width="110" height="26" rx="13" fill="#0d1f3c" stroke="#79c0ff" stroke-width="1"/>
  <text x="615" y="484" font-family="Inter, sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">Auth Middleware</text>

  <rect x="685" y="466" width="110" height="26" rx="13" fill="#1a0d2e" stroke="#d2a8ff" stroke-width="1"/>
  <text x="740" y="484" font-family="Inter, sans-serif" font-size="10" fill="#d2a8ff" text-anchor="middle">RBAC requireRole</text>

  <text x="460" y="520" font-family="Inter, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Referencia: https://owasp.org/Top10/ — OWASP Top 10 2021</text>
</svg>
