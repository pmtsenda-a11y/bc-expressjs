<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520">
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="520" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="460" y="38" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">Flujo RBAC — Autorización Basada en Roles</text>
  <text x="460" y="58" font-family="Inter, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">authMiddleware verifica identidad · requireRole() verifica permisos</text>

  <!-- ─── REQUEST FLOW (top horizontal) ─── -->
  <!-- Client box -->
  <rect x="30" y="90" width="110" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="85" y="111" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">Cliente</text>
  <text x="85" y="127" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">HTTP Request</text>

  <!-- Arrow client → authMiddleware -->
  <line x1="140" y1="115" x2="195" y2="115" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="167" y="108" font-family="Inter, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">JWT cookie</text>

  <!-- authMiddleware box -->
  <rect x="195" y="90" width="155" height="50" rx="8" fill="#0d2137" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="272" y="111" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle">authMiddleware</text>
  <text x="272" y="127" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">verifica JWT → req.user</text>

  <!-- Arrow authMiddleware → requireRole -->
  <line x1="350" y1="115" x2="405" y2="115" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="377" y="108" font-family="Inter, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">req.user</text>

  <!-- requireRole box -->
  <rect x="405" y="90" width="155" height="50" rx="8" fill="#0d2e10" stroke="#4ade80" stroke-width="1.5"/>
  <text x="482" y="111" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">requireRole('admin')</text>
  <text x="482" y="127" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">verifica req.user.role</text>

  <!-- Arrow requireRole → Controller (success) -->
  <line x1="560" y1="115" x2="615" y2="115" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="587" y="108" font-family="Inter, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">role ok</text>

  <!-- Controller box -->
  <rect x="615" y="90" width="120" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="675" y="111" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#e6edf3" text-anchor="middle">Controller</text>
  <text x="675" y="127" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">lógica de negocio</text>

  <!-- Arrow Controller → 200 -->
  <line x1="735" y1="115" x2="790" y2="115" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 200 box -->
  <rect x="790" y="90" width="100" height="50" rx="8" fill="#0d2e10" stroke="#4ade80" stroke-width="1"/>
  <text x="840" y="111" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">200 OK</text>
  <text x="840" y="127" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Respuesta</text>

  <!-- ─── ERROR PATHS (below) ─── -->
  <!-- 401 path from authMiddleware (no token) -->
  <line x1="272" y1="140" x2="272" y2="185" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="195" y="185" width="155" height="50" rx="8" fill="#2d1117" stroke="#f87171" stroke-width="1.5"/>
  <text x="272" y="206" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#f87171" text-anchor="middle">401 Unauthorized</text>
  <text x="272" y="222" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Sin token / token inválido</text>

  <!-- 403 path from requireRole (wrong role) -->
  <line x1="482" y1="140" x2="482" y2="185" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="405" y="185" width="155" height="50" rx="8" fill="#2d2200" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="482" y="206" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">403 Forbidden</text>
  <text x="482" y="222" font-family="Inter, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Token válido, rol insuficiente</text>

  <!-- ─── ROLES TABLE ─── -->
  <rect x="30" y="280" width="860" height="200" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="460" y="305" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#e6edf3" text-anchor="middle">Matriz de Permisos por Rol</text>

  <!-- Table header -->
  <rect x="50" y="318" width="820" height="32" rx="4" fill="#1c2128"/>
  <text x="165" y="339" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Rol</text>
  <text x="340" y="339" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Leer (GET)</text>
  <text x="490" y="339" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Crear (POST)</text>
  <text x="640" y="339" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Editar (PATCH)</text>
  <text x="790" y="339" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8b949e" text-anchor="middle">Eliminar (DELETE)</text>

  <!-- Row: sin auth / guest -->
  <rect x="50" y="350" width="820" height="36" rx="0" fill="#0d1117"/>
  <text x="165" y="373" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">sin token</text>
  <text x="340" y="373" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="490" y="373" font-family="Inter, sans-serif" font-size="14" fill="#f87171" text-anchor="middle">✗</text>
  <text x="640" y="373" font-family="Inter, sans-serif" font-size="14" fill="#f87171" text-anchor="middle">✗</text>
  <text x="790" y="373" font-family="Inter, sans-serif" font-size="14" fill="#f87171" text-anchor="middle">✗</text>

  <!-- Row: user -->
  <rect x="50" y="386" width="820" height="36" rx="0" fill="#161b22"/>
  <text x="165" y="409" font-family="Inter, sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">user</text>
  <text x="340" y="409" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="490" y="409" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="640" y="409" font-family="Inter, sans-serif" font-size="14" fill="#f87171" text-anchor="middle">✗</text>
  <text x="790" y="409" font-family="Inter, sans-serif" font-size="14" fill="#f87171" text-anchor="middle">✗</text>

  <!-- Row: admin -->
  <rect x="50" y="422" width="820" height="36" rx="0" fill="#0d1117"/>
  <text x="165" y="445" font-family="Inter, sans-serif" font-size="11" fill="#f0883e" text-anchor="middle">admin</text>
  <text x="340" y="445" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="490" y="445" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="640" y="445" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>
  <text x="790" y="445" font-family="Inter, sans-serif" font-size="14" fill="#4ade80" text-anchor="middle">✓</text>

  <!-- Bottom note -->
  <text x="460" y="498" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">El campo role viaja firmado en el payload del JWT — no puede ser falsificado sin el secret</text>
</svg>
