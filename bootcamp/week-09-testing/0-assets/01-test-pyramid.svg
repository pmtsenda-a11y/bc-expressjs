<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" width="920" height="540">
  <rect width="920" height="540" fill="#0d1117"/>

  <!-- Title -->
  <text x="460" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#c9d1d9" text-anchor="middle">Pirámide de Testing</text>
  <text x="460" y="62" font-family="Inter, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Cuantos más tests, más rápidos y baratos debe ser el nivel</text>

  <!-- ── E2E Layer (top) ── -->
  <polygon points="460,100 330,200 590,200" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="460" y="162" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#f97316" text-anchor="middle">E2E Tests</text>
  <text x="460" y="180" font-family="Inter, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Playwright / Cypress</text>

  <!-- E2E Tag: slow + expensive -->
  <rect x="620" y="130" width="100" height="24" rx="4" fill="#2d1b00"/>
  <text x="670" y="146" font-family="Inter, sans-serif" font-size="11" fill="#f97316" text-anchor="middle">🐢 Lentos</text>
  <rect x="730" y="130" width="110" height="24" rx="4" fill="#2d1b00"/>
  <text x="785" y="146" font-family="Inter, sans-serif" font-size="11" fill="#f97316" text-anchor="middle">💰 Costosos</text>
  <line x1="590" y1="150" x2="618" y2="143" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Integration Layer (middle) ── -->
  <polygon points="330,200 590,200 650,320 270,320" fill="#161b22" stroke="#374151" stroke-width="1.5"/>
  <text x="460" y="270" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">Integration Tests</text>
  <text x="460" y="290" font-family="Inter, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Supertest + MongoDB Memory Server</text>
  <text x="460" y="308" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">auth.routes.test.ts · users.routes.test.ts</text>

  <!-- Integration tags -->
  <rect x="665" y="248" width="120" height="24" rx="4" fill="#0c1a2e"/>
  <text x="725" y="264" font-family="Inter, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">🗄️ DB en memoria</text>
  <rect x="665" y="278" width="120" height="24" rx="4" fill="#0c1a2e"/>
  <text x="725" y="294" font-family="Inter, sans-serif" font-size="11" fill="#38bdf8" text-anchor="middle">⚡ Velocidad media</text>
  <line x1="650" y1="265" x2="663" y2="265" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Unit Tests Layer (base) ── -->
  <polygon points="270,320 650,320 740,450 180,450" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="460" y="378" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#34d399" text-anchor="middle">Unit Tests</text>
  <text x="460" y="399" font-family="Inter, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Jest + Mocks — servicios aislados de la DB</text>
  <text x="460" y="418" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">auth.service.test.ts · user.service.test.ts · items.service.test.ts</text>
  <text x="460" y="436" font-family="Inter, sans-serif" font-size="11" fill="#4b5563" text-anchor="middle">🚀 Rápidos &nbsp; 💵 Baratos &nbsp; 🔒 Aislados</text>

  <!-- Quantity labels on left -->
  <text x="158" y="158" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Pocos</text>
  <text x="148" y="268" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Algunos</text>
  <text x="138" y="390" font-family="Inter, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Muchos</text>

  <!-- Vertical arrow -->
  <line x1="158" y1="112" x2="158" y2="440" stroke="#374151" stroke-width="1.5"/>
  <polygon points="158,106 153,118 163,118" fill="#374151"/>

  <!-- Legend -->
  <rect x="180" y="468" width="560" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="220" cy="494" r="6" fill="#34d399"/>
  <text x="232" y="498" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Unit (jest.fn, jest.mock)</text>
  <circle cx="400" cy="494" r="6" fill="#38bdf8"/>
  <text x="412" y="498" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">Integration (Supertest)</text>
  <circle cx="580" cy="494" r="6" fill="#f97316"/>
  <text x="592" y="498" font-family="Inter, sans-serif" font-size="12" fill="#8b949e">E2E (browser)</text>
</svg>
