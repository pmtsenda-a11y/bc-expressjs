<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <rect width="960" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="36" font-family="Inter, sans-serif" font-size="19" font-weight="700" fill="#c9d1d9" text-anchor="middle">Flujo de Supertest en Tests de Integración</text>

  <!-- ── TEST FILE ── -->
  <rect x="30" y="90" width="140" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="100" y="122" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Test File</text>
  <text x="100" y="140" font-family="Inter, monospace" font-size="10" fill="#8b949e" text-anchor="middle">auth.routes</text>
  <text x="100" y="155" font-family="Inter, monospace" font-size="10" fill="#8b949e" text-anchor="middle">.test.ts</text>
  <text x="100" y="170" font-family="Inter, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">request(app)</text>

  <!-- arrow 1 -->
  <line x1="170" y1="135" x2="207" y2="135" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="188" y="126" font-family="Inter, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">HTTP</text>

  <!-- ── SUPERTEST ── -->
  <rect x="208" y="100" width="120" height="70" rx="8" fill="#0c1a2e" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="268" y="128" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" text-anchor="middle">Supertest</text>
  <text x="268" y="147" font-family="Inter, monospace" font-size="10" fill="#8b949e" text-anchor="middle">supertest(app)</text>
  <text x="268" y="161" font-family="Inter, sans-serif" font-size="9" fill="#4b5563" text-anchor="middle">sin puerto real</text>

  <!-- arrow 2 -->
  <line x1="328" y1="135" x2="365" y2="135" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── EXPRESS APP ── -->
  <rect x="366" y="70" width="200" height="270" rx="8" fill="#161b22" stroke="#374151" stroke-width="1.5"/>
  <text x="466" y="98" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#c9d1d9" text-anchor="middle">Express App</text>
  <text x="466" y="114" font-family="Inter, monospace" font-size="10" fill="#4b5563" text-anchor="middle">app.ts</text>

  <!-- middleware stack inside -->
  <rect x="386" y="122" width="160" height="26" rx="4" fill="#1c2333"/>
  <text x="466" y="139" font-family="Inter, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">helmet()</text>
  <rect x="386" y="154" width="160" height="26" rx="4" fill="#1c2333"/>
  <text x="466" y="171" font-family="Inter, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">cors()</text>
  <rect x="386" y="186" width="160" height="26" rx="4" fill="#1c2333"/>
  <text x="466" y="203" font-family="Inter, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">express.json()</text>
  <rect x="386" y="218" width="160" height="26" rx="4" fill="#1c2333"/>
  <text x="466" y="235" font-family="Inter, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">rateLimiter</text>
  <rect x="386" y="250" width="160" height="26" rx="4" fill="#142010" stroke="#22c55e" stroke-width="1"/>
  <text x="466" y="267" font-family="Inter, monospace" font-size="11" fill="#4ade80" text-anchor="middle">router.post('/register')</text>
  <rect x="386" y="282" width="160" height="26" rx="4" fill="#1c2333"/>
  <text x="466" y="299" font-family="Inter, monospace" font-size="11" fill="#a5b4fc" text-anchor="middle">errorHandler</text>

  <!-- arrow 3 -->
  <line x1="566" y1="175" x2="605" y2="175" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── CONTROLLER ── -->
  <rect x="606" y="148" width="120" height="54" rx="8" fill="#161b22" stroke="#374151" stroke-width="1.5"/>
  <text x="666" y="170" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Controller</text>
  <text x="666" y="188" font-family="Inter, monospace" font-size="10" fill="#8b949e" text-anchor="middle">auth.controller.ts</text>

  <!-- arrow 4 -->
  <line x1="726" y1="175" x2="763" y2="175" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── SERVICE ── -->
  <rect x="764" y="148" width="120" height="54" rx="8" fill="#161b22" stroke="#374151" stroke-width="1.5"/>
  <text x="824" y="170" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#c9d1d9" text-anchor="middle">Service</text>
  <text x="824" y="188" font-family="Inter, monospace" font-size="10" fill="#8b949e" text-anchor="middle">auth.service.ts</text>

  <!-- arrow down to DB -->
  <line x1="824" y1="202" x2="824" y2="258" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── MONGODB MEMORY SERVER ── -->
  <rect x="734" y="258" width="180" height="90" rx="8" fill="#0c201a" stroke="#059669" stroke-width="1.5"/>
  <text x="824" y="285" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle">MongoDB</text>
  <text x="824" y="303" font-family="Inter, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">Memory Server</text>
  <text x="824" y="319" font-family="Inter, monospace" font-size="10" fill="#6b7280" text-anchor="middle">MongoMemoryServer</text>
  <text x="824" y="335" font-family="Inter, monospace" font-size="10" fill="#6b7280" text-anchor="middle">.create()</text>

  <!-- response arrow (curved via bottom) -->
  <path d="M 370 340 Q 250 400 170 180" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrGreen)"/>
  <text x="235" y="410" font-family="Inter, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">res: 201 / 401 / 409…</text>

  <!-- Legend -->
  <rect x="30" y="400" width="500" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="50" y="418" width="12" height="12" rx="2" fill="#0c1a2e" stroke="#1d4ed8" stroke-width="1"/>
  <text x="70" y="428" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">Supertest — no listen()</text>
  <rect x="200" y="418" width="12" height="12" rx="2" fill="#142010" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="428" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">Ruta activa en el test</text>
  <rect x="355" y="418" width="12" height="12" rx="2" fill="#0c201a" stroke="#059669" stroke-width="1"/>
  <text x="375" y="428" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">DB en RAM (sin Docker)</text>
  <line x1="50" y1="442" x2="80" y2="442" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="90" y="446" font-family="Inter, sans-serif" font-size="11" fill="#8b949e">Respuesta HTTP</text>

  <!-- Arrowhead marker definitions -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
