<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#68A063"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e06c75"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#68A063" text-anchor="middle">Pipeline de Seguridad — File Uploads</text>
  <text x="480" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Multer + validaciones de seguridad OWASP</text>

  <!-- STAGE 1: Cliente -->
  <rect x="20" y="90" width="130" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="85" y="118" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">Cliente</text>
  <text x="85" y="138" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">POST /upload</text>
  <text x="85" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">multipart/form-data</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="130" x2="188" y2="130" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAGE 2: Multer Parser -->
  <rect x="190" y="90" width="140" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="260" y="118" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">Multer Parser</text>
  <text x="260" y="138" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">multipart decoder</text>
  <text x="260" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle">memoryStorage</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="130" x2="368" y2="130" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STAGE 3: fileFilter -->
  <rect x="370" y="90" width="150" height="80" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="445" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0883e" text-anchor="middle">fileFilter</text>
  <text x="445" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Valida MIME type</text>
  <text x="445" y="147" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">image/jpeg, image/png</text>
  <text x="445" y="162" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">image/webp</text>

  <!-- Arrow 3 (ok) -->
  <line x1="520" y1="130" x2="558" y2="130" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="539" y="123" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#68A063" text-anchor="middle">OK</text>

  <!-- Arrow reject (down from fileFilter) -->
  <line x1="445" y1="170" x2="445" y2="208" stroke="#e06c75" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="480" y="195" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e06c75">400 MIME inv&#225;lido</text>

  <!-- STAGE 4: limits check -->
  <rect x="560" y="90" width="150" height="80" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="635" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0883e" text-anchor="middle">limits</text>
  <text x="635" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">fileSize: 5 MB</text>
  <text x="635" y="147" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">files: 1</text>
  <text x="635" y="164" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">fields: 10</text>

  <!-- Arrow 4 (ok) -->
  <line x1="710" y1="130" x2="748" y2="130" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="729" y="123" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#68A063" text-anchor="middle">OK</text>

  <!-- Arrow reject (down from limits) -->
  <line x1="635" y1="170" x2="635" y2="208" stroke="#e06c75" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="670" y="195" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#e06c75">400 muy grande</text>

  <!-- STAGE 5: Controller -->
  <rect x="750" y="90" width="140" height="80" rx="8" fill="#161b22" stroke="#68A063" stroke-width="1.5"/>
  <text x="820" y="110" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#68A063" text-anchor="middle">Controller</text>
  <text x="820" y="130" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">req.file.buffer</text>
  <text x="820" y="147" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle">&#8594; Upload Service</text>
  <text x="820" y="164" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle">&#8594; Cloudinary</text>

  <!-- Section: Error middleware (bottom) -->
  <rect x="290" y="230" width="380" height="60" rx="8" fill="#161b22" stroke="#e06c75" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="480" y="255" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e06c75" text-anchor="middle">errorMiddleware</text>
  <text x="480" y="275" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">captura MulterError (LIMIT_FILE_SIZE, LIMIT_FILE_COUNT) &#8594; 400</text>

  <!-- Divider -->
  <line x1="40" y1="320" x2="920" y2="320" stroke="#21262d" stroke-width="1"/>

  <!-- Title section 2 -->
  <text x="480" y="350" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#cdd9e5" text-anchor="middle">Validaciones de Seguridad Implementadas</text>

  <!-- Security items: 3 columns -->
  <!-- Col 1 -->
  <rect x="40" y="365" width="270" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="388" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#68A063">&#10003; MIME Type Validation</text>
  <text x="60" y="408" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Bloquea archivos disfrazados con</text>
  <text x="60" y="424" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">extensi&#243;n falsa (.exe &#8594; .jpg)</text>
  <text x="60" y="444" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Set de MIME types permitidos en fileFilter</text>

  <!-- Col 2 -->
  <rect x="345" y="365" width="270" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="365" y="388" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#f0883e">&#10003; Size Limits</text>
  <text x="365" y="408" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Previene DoS por archivos enormes</text>
  <text x="365" y="424" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">limits.fileSize: 5 MB</text>
  <text x="365" y="444" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">limits.files: 1 | limits.fields: 10</text>

  <!-- Col 3 -->
  <rect x="650" y="365" width="270" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="670" y="388" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#79c0ff">&#10003; No Path Traversal</text>
  <text x="670" y="408" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">memoryStorage: no escribe en disco</text>
  <text x="670" y="424" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Buffer en memoria &#8594; stream a Cloudinary</text>
  <text x="670" y="444" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Nombre de archivo generado server-side</text>
</svg>
