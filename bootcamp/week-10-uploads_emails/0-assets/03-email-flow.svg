<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#68A063"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#68A063" text-anchor="middle">Flujo de Emails Transaccionales</text>
  <text x="480" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Nodemailer + Ethereal (dev) / SMTP real (prod)</text>

  <!-- === TRIGGER EVENTS (left column) === -->
  <text x="80" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cdd9e5" text-anchor="middle">Eventos</text>

  <!-- Event 1: Register -->
  <rect x="20" y="115" width="130" height="55" rx="6" fill="#161b22" stroke="#68A063" stroke-width="1.5"/>
  <text x="85" y="137" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#68A063" text-anchor="middle">POST /register</text>
  <text x="85" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Usuario creado</text>

  <!-- Event 2: forgot-password -->
  <rect x="20" y="195" width="130" height="55" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="85" y="217" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0883e" text-anchor="middle">POST /forgot</text>
  <text x="85" y="235" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Token generado</text>

  <!-- === AUTH SERVICE (center-left) === -->
  <text x="265" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cdd9e5" text-anchor="middle">Auth Service</text>

  <!-- Service box -->
  <rect x="185" y="115" width="160" height="135" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="265" y="141" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">auth.service.ts</text>
  <line x1="185" y1="150" x2="345" y2="150" stroke="#21262d" stroke-width="1"/>
  <text x="265" y="168" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">register() &#8594;</text>
  <text x="265" y="183" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">sendWelcomeEmail() (fire&#38;forget)</text>
  <line x1="185" y1="195" x2="345" y2="195" stroke="#21262d" stroke-width="1"/>
  <text x="265" y="213" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">forgotPassword() &#8594;</text>
  <text x="265" y="228" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">sendResetEmail() (await)</text>

  <!-- Arrows: events to service -->
  <line x1="150" y1="142" x2="183" y2="150" stroke="#68A063" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="222" x2="183" y2="215" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Arrow: service to email service -->
  <line x1="345" y1="183" x2="418" y2="183" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="345" y1="220" x2="418" y2="220" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- === EMAIL SERVICE === -->
  <text x="510" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cdd9e5" text-anchor="middle">Email Service</text>

  <rect x="420" y="115" width="180" height="135" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="510" y="141" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">email.service.ts</text>
  <line x1="420" y1="150" x2="600" y2="150" stroke="#21262d" stroke-width="1"/>
  <text x="510" y="169" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#68A063" text-anchor="middle">sendWelcomeEmail()</text>
  <text x="510" y="185" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">template: welcomeEmailTemplate()</text>
  <line x1="420" y1="198" x2="600" y2="198" stroke="#21262d" stroke-width="1"/>
  <text x="510" y="217" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f0883e" text-anchor="middle">sendResetEmail()</text>
  <text x="510" y="233" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">template: resetPasswordTemplate()</text>

  <!-- Arrow: email service to transporter -->
  <line x1="600" y1="183" x2="668" y2="183" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === TRANSPORTER === -->
  <text x="760" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#cdd9e5" text-anchor="middle">Transporter</text>

  <rect x="670" y="115" width="160" height="135" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="750" y="141" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="middle">Nodemailer</text>
  <line x1="670" y1="150" x2="830" y2="150" stroke="#21262d" stroke-width="1"/>

  <!-- DEV label -->
  <rect x="686" y="158" width="118" height="38" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="745" y="173" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#79c0ff" text-anchor="middle">DEV / TEST</text>
  <text x="745" y="189" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Ethereal SMTP</text>

  <!-- PROD label -->
  <rect x="686" y="204" width="118" height="38" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="745" y="219" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#68A063" text-anchor="middle">PROD</text>
  <text x="745" y="235" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">SMTP_HOST/.env</text>

  <!-- Arrow to delivery -->
  <line x1="830" y1="183" x2="883" y2="183" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === DELIVERY === -->
  <rect x="886" y="115" width="60" height="135" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="916" y="188" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#68A063" text-anchor="middle" transform="rotate(-90, 916, 188)">Inbox del usuario</text>

  <!-- === BOTTOM SECTION: Ethereal dev preview === -->
  <line x1="40" y1="290" x2="920" y2="290" stroke="#21262d" stroke-width="1"/>
  <text x="480" y="318" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#79c0ff" text-anchor="middle">Desarrollo: Preview URL de Ethereal</text>

  <!-- Terminal style box -->
  <rect x="80" y="330" width="800" height="90" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="355" font-family="'Courier New', Courier, monospace" font-size="12" fill="#68A063">$ pnpm dev</text>
  <text x="100" y="375" font-family="'Courier New', Courier, monospace" font-size="12" fill="#8b949e">&#128231; Ethereal configurado: random.user@ethereal.email</text>
  <text x="100" y="393" font-family="'Courier New', Courier, monospace" font-size="12" fill="#8b949e">&#128231; Email de bienvenida enviado:</text>
  <text x="100" y="410" font-family="'Courier New', Courier, monospace" font-size="12" fill="#79c0ff">    https://ethereal.email/message/AbCdEf123456...</text>

  <!-- Note -->
  <text x="480" y="448" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#8b949e" text-anchor="middle">El enlace de Ethereal abre el email en el navegador &#8212; sin enviar nada real al inbox del usuario</text>
</svg>
