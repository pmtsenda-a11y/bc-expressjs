<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#68A063"/>
    </marker>
    <marker id="arrow-back" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#79c0ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="38" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#68A063" text-anchor="middle">Flujo: Upload a Cloudinary</text>
  <text x="480" y="60" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Multer memoryStorage &#8594; Buffer &#8594; upload_stream &#8594; Cloudinary CDN</text>

  <!-- === FORWARD FLOW (top row) === -->

  <!-- Box 1: Test/Client -->
  <rect x="30" y="100" width="130" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="95" y="126" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">Cliente HTTP</text>
  <text x="95" y="145" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">PUT /users/me/avatar</text>
  <text x="95" y="161" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">multipart/form-data</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="135" x2="198" y2="135" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: auth middleware -->
  <rect x="200" y="100" width="130" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="265" y="126" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">auth</text>
  <text x="265" y="144" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">verifica JWT</text>
  <text x="265" y="161" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle">req.user</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="135" x2="368" y2="135" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: multer -->
  <rect x="370" y="100" width="130" height="70" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="435" y="118" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f0883e" text-anchor="middle">Multer</text>
  <text x="435" y="136" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">.single('avatar')</text>
  <text x="435" y="153" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">fileFilter + limits</text>
  <text x="435" y="165" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">req.file.buffer</text>

  <!-- Arrow 3 -->
  <line x1="500" y1="135" x2="538" y2="135" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: Controller -->
  <rect x="540" y="100" width="130" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="605" y="126" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">Controller</text>
  <text x="605" y="144" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">updateAvatar()</text>
  <text x="605" y="161" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">llama al service</text>

  <!-- Arrow 4 -->
  <line x1="670" y1="135" x2="708" y2="135" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 5: Upload Service -->
  <rect x="710" y="100" width="150" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="785" y="120" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">Upload Service</text>
  <text x="785" y="138" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">uploadToCloudinary()</text>
  <text x="785" y="155" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">upload_stream(buffer)</text>
  <text x="785" y="168" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#79c0ff" text-anchor="middle">stream.end(buffer)</text>

  <!-- Arrow down from service to cloudinary -->
  <line x1="785" y1="170" x2="785" y2="213" stroke="#68A063" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 6: Cloudinary -->
  <rect x="700" y="215" width="170" height="80" rx="8" fill="#161b22" stroke="#68A063" stroke-width="2"/>
  <text x="785" y="240" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#68A063" text-anchor="middle">Cloudinary</text>
  <text x="785" y="260" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">CDN + transformaciones</text>
  <text x="785" y="278" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle">secure_url + public_id</text>

  <!-- Return arrow from Cloudinary back to upload service -->
  <line x1="700" y1="255" x2="660" y2="255" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-back)"/>

  <!-- Box 7: Repository (bottom-center) -->
  <rect x="490" y="215" width="160" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="570" y="242" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3" text-anchor="middle">Repository</text>
  <text x="570" y="261" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">update(userId, {</text>
  <text x="570" y="279" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">avatarUrl, publicId })</text>

  <!-- Arrow from upload service area to repository -->
  <line x1="660" y1="252" x2="652" y2="252" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="651" y1="252" x2="651" y2="255" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="651" y1="255" x2="652" y2="255" stroke="#79c0ff" stroke-width="1.5"/>
  <line x1="652" y1="255" x2="648" y2="255" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arrow-back)"/>

  <!-- Simplified return: service saves to repo -->
  <line x1="700" y1="260" x2="652" y2="260" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-back)"/>

  <!-- Arrow from repository to DB simb -->
  <line x1="570" y1="295" x2="570" y2="330" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-back)"/>

  <!-- DB symbol -->
  <ellipse cx="570" cy="342" rx="50" ry="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="520" y="342" width="100" height="28" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <ellipse cx="570" cy="370" rx="50" ry="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="570" y="360" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">MongoDB</text>

  <!-- Response arrow back to client (bottom) -->
  <line x1="570" y1="215" x2="95" y2="215" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="95" y1="215" x2="95" y2="172" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-back)"/>
  <text x="320" y="208" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#79c0ff" text-anchor="middle">&#8592; 200 { avatarUrl: "https://res.cloudinary.com/..." }</text>

  <!-- Info boxes at bottom -->
  <rect x="30" y="415" width="260" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="435" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#68A063">upload_stream pattern</text>
  <text x="50" y="452" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Buffer &#8594; Writable Stream &#8594; Cloudinary API</text>

  <rect x="310" y="415" width="300" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="330" y="435" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#f0883e">delete antes de subir</text>
  <text x="330" y="452" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Si user.avatarPublicId &#8594; destroy() primero</text>

  <rect x="630" y="415" width="300" height="50" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="650" y="435" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#79c0ff">public_id en BD</text>
  <text x="650" y="452" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#8b949e">Necesario para futuras operaciones destroy()</text>
</svg>
