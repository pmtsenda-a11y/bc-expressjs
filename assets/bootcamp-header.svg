<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200"
     role="img" aria-labelledby="btitle bdesc">
  <title id="btitle">Bootcamp ExpressJS Zero to Hero</title>
  <desc id="bdesc">Banner: Bootcamp ExpressJS Zero to Hero — 16 semanas, 128 horas, Node.js 22, TypeScript 5, APIs REST Modernas con Express 5</desc>

  <!-- Fondo -->
  <rect width="800" height="200" fill="#0d1117"/>

  <!-- Barra de acento izquierda -->
  <rect x="0" y="0" width="4" height="200" fill="#68A063"/>

  <!-- Hexágono de fondo sutil (Node.js) -->
  <polygon points="200,15 273.6,57.5 273.6,142.5 200,185 126.4,142.5 126.4,57.5"
           fill="#68A063" fill-opacity="0.04"
           stroke="#68A063" stroke-width="1.5" stroke-opacity="0.1"/>

  <!-- ═══════════ SECCIÓN IZQUIERDA ═══════════ -->

  <!-- Label: BOOTCAMP -->
  <text x="28" y="44"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" font-weight="600" letter-spacing="4"
        fill="#484f58">BOOTCAMP</text>

  <!-- Título principal: Express.js -->
  <text x="28" y="106"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="58" font-weight="700">
    <tspan fill="#f0f6fc">Express</tspan><tspan fill="#68A063">.js</tspan>
  </text>

  <!-- Subtítulo: Zero to Hero -->
  <text x="28" y="134"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="400"
        fill="#8b949e">Zero to Hero</text>

  <!-- Chip: 16 semanas -->
  <rect x="28" y="152" width="84" height="20" rx="4"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="166"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="500"
        fill="#8b949e" text-anchor="middle">16 semanas</text>

  <!-- Chip: 128 horas -->
  <rect x="118" y="152" width="74" height="20" rx="4"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="155" y="166"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="500"
        fill="#8b949e" text-anchor="middle">128 horas</text>

  <!-- Chip: Node.js 22 -->
  <rect x="198" y="152" width="76" height="20" rx="4"
        fill="#0d2310" stroke="#68A063" stroke-width="1"/>
  <text x="236" y="166"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="600"
        fill="#68A063" text-anchor="middle">Node.js 22</text>

  <!-- Chip: TypeScript 5 -->
  <rect x="280" y="152" width="80" height="20" rx="4"
        fill="#0a1929" stroke="#58a6ff" stroke-width="1"/>
  <text x="320" y="166"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="600"
        fill="#58a6ff" text-anchor="middle">TypeScript 5</text>

  <!-- Divisor vertical -->
  <line x1="400" y1="20" x2="400" y2="180" stroke="#21262d" stroke-width="1"/>

  <!-- ═══════════ SECCIÓN DERECHA: Terminal ═══════════ -->

  <!-- Caja terminal -->
  <rect x="416" y="22" width="360" height="156" rx="8"
        fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Barra superior terminal -->
  <rect x="417" y="23" width="358" height="27" rx="7" fill="#21262d"/>
  <rect x="417" y="38" width="358" height="12" fill="#21262d"/>

  <!-- Dots macOS -->
  <circle cx="437" cy="36" r="5" fill="#f85149"/>
  <circle cx="455" cy="36" r="5" fill="#d29922"/>
  <circle cx="473" cy="36" r="5" fill="#3fb950"/>

  <!-- Título de la terminal -->
  <text x="596" y="41"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#484f58" text-anchor="middle">REST API Routes</text>

  <!-- Divisor barra/contenido -->
  <line x1="416" y1="50" x2="776" y2="50" stroke="#30363d" stroke-width="1"/>

  <!-- GET /api/v1/users -->
  <rect x="432" y="60" width="40" height="16" rx="3"
        fill="#0d2310" stroke="#68A063" stroke-width="1"/>
  <text x="452" y="72"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="700"
        fill="#68A063" text-anchor="middle">GET</text>
  <text x="480" y="72"
        font-family="ui-monospace,Consolas,monospace"
        font-size="12" fill="#8b949e">/api/v1/users</text>
  <text x="766" y="72"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="500"
        fill="#3fb950" text-anchor="end">200 OK</text>

  <!-- POST /api/v1/auth/login -->
  <rect x="432" y="82" width="40" height="16" rx="3"
        fill="#0a1929" stroke="#58a6ff" stroke-width="1"/>
  <text x="452" y="94"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="700"
        fill="#58a6ff" text-anchor="middle">POST</text>
  <text x="480" y="94"
        font-family="ui-monospace,Consolas,monospace"
        font-size="12" fill="#8b949e">/api/v1/auth/login</text>
  <text x="766" y="94"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="500"
        fill="#3fb950" text-anchor="end">201 Created</text>

  <!-- PUT /api/v1/items/:id -->
  <rect x="432" y="104" width="40" height="16" rx="3"
        fill="#2d1f00" stroke="#d29922" stroke-width="1"/>
  <text x="452" y="116"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="700"
        fill="#d29922" text-anchor="middle">PUT</text>
  <text x="480" y="116"
        font-family="ui-monospace,Consolas,monospace"
        font-size="12" fill="#8b949e">/api/v1/items/:id</text>
  <text x="766" y="116"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="500"
        fill="#3fb950" text-anchor="end">200 OK</text>

  <!-- DEL /api/v1/items/:id -->
  <rect x="432" y="126" width="40" height="16" rx="3"
        fill="#2d0000" stroke="#f85149" stroke-width="1"/>
  <text x="452" y="138"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="700"
        fill="#f85149" text-anchor="middle">DEL</text>
  <text x="480" y="138"
        font-family="ui-monospace,Consolas,monospace"
        font-size="12" fill="#8b949e">/api/v1/items/:id</text>
  <text x="766" y="138"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" font-weight="500"
        fill="#484f58" text-anchor="end">204 No Content</text>

  <!-- Footer terminal -->
  <line x1="416" y1="154" x2="776" y2="154" stroke="#21262d" stroke-width="1"/>
  <text x="596" y="167"
        font-family="ui-monospace,Consolas,monospace"
        font-size="10" fill="#484f58" text-anchor="middle">Prisma · JWT · Redis · Socket.io · Docker</text>

  <!-- Línea inferior del banner -->
  <line x1="4" y1="199" x2="800" y2="199" stroke="#21262d" stroke-width="1"/>

</svg>
